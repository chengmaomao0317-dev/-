              const v = ds.data[i];
              if (!v) return;
              ctx.fillText(String(v), bar.x, bar.y + (bar.height||0)/2);
            });
            ctx.restore();
          });
        }
      }]
    });
  });
}

function renderMediaCard() {
  const el = document.getElementById('media-card');
  if (!el) return;
  const fmt = v => '$' + Math.round(v).toLocaleString('zh-TW');

  const sumMedia = b => {
    const acc = { meta:0, google:0, lineat:0, koubei:0, seo:0, other:0 };
    for (let m = 0; m < 6; m++) {
      const mc = adsMonthlyData[b][m]?.mediaChannels;
      if (!mc) continue;
      acc.meta   += (mc.metaTpe||0)+(mc.metaTca||0);
      acc.google += (mc.googleTpe||0)+(mc.googleTca||0);
      acc.lineat += mc.lineat||0;
      acc.koubei += mc.koubei||0;
      acc.seo    += mc.seo||0;
    }
    acc.other = 11760;
    return acc;
  };

  const buildBrand = (b, label, tagCls, gradStart, gradEnd) => {
    const mc = sumMedia(b);
    const total = (kpiTrend[b].spend26||[]).reduce((s,v)=>s+(v||0),0);
    const channels = [
      { name:'Meta',   val: mc.meta   },
      { name:'Google', val: mc.google },
      { name:'LINE@',  val: mc.lineat },
      { name:'口碑',   val: mc.koubei },
      { name:'SEO',    val: mc.seo    },
      { name:'其他',   val: mc.other  },
    ].filter(c => c.val > 0).sort((a,b) => b.val - a.val);
    const maxVal = channels[0]?.val || 1;

    const rows = channels.map(c => {
      const p = total ? Math.round(c.val / total * 100) : 0;
      const barW = Math.min(100, Math.round(c.val / maxVal * 100));
      return `<div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;">
          <span style="font-size:12px;color:var(--color-text-secondary);">${c.name}</span>
          <span style="font-size:13px;font-weight:500;color:var(--color-text-primary);">${fmt(c.val)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="flex:1;height:8px;background:var(--color-background-secondary);border-radius:99px;overflow:hidden;">
            <div style="height:100%;width:${barW}%;background:linear-gradient(90deg,${gradStart},${gradEnd});border-radius:99px;"></div>
          </div>
          <span style="font-size:11px;color:var(--color-text-secondary);width:28px;text-align:right;flex-shrink:0;">${p}%</span>
        </div>
      </div>`;
    }).join('');

    return `<div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;">
        <span class="brand-tag ${tagCls}">${label}</span>
        <span style="font-size:12px;color:var(--color-text-secondary);">年度合計 ${fmt(total)}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:9px;">${rows}</div>
    </div>`;
  };

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 0.5px 1fr;gap:0 24px;">
      ${buildBrand('wo','原渥','tag-wo','#185FA5','#85B7EB')}
      <div style="background:rgba(0,0,0,0.08);"></div>
      ${buildBrand('qi','原綺','tag-qi','#993556','#ed93b1')}
    </div>`;
}

function renderSpendChartCard() {
  const el = document.getElementById('spend-chart-card');
  if (!el) return;

  const MONTHS = kpiTrend.wo.labels; // 動態，目前 1-7月

  // 取得各品牌各月媒體明細（以 spend26 為總量基準，其他 = 差額）
  function getMonthBreakdown(b, mi) {
    const total = (kpiTrend[b].spend26[mi]) || 0;
    if (!total) return null;
    const mc = adsMonthlyData[b][mi]?.mediaChannels || {};
    const meta   = (mc.metaTpe||0) + (mc.metaTca||0);
    const google = (mc.googleTpe||0) + (mc.googleTca||0);
    const lineat = mc.lineat || 0;
    const koubei = mc.koubei || 0;
    const seo    = mc.seo   || 0;
    const other  = Math.max(0, total - meta - google - lineat - koubei - seo);
    return { total, meta, google, lineat, koubei, seo, other };
  }

  // 格式化實際數字（千分位）
  const fmt = v => v > 0 ? '$' + Math.round(v).toLocaleString('zh-TW') : '-';

  // 渲染單一品牌柱狀圖
  function buildBrandChart(b, label, tagCls, colors) {
    const data = MONTHS.map((_,i) => getMonthBreakdown(b, i));
    const max  = Math.max(...data.map(d => d?.total || 0)) || 1;
    const BAR_H = 120;

    const cols = MONTHS.map((m, i) => {
      const d = data[i];
      if (!d || !d.total) {
        return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:2px;">
          <span style="font-size:9px;color:var(--color-text-tertiary);line-height:1.3;text-align:center;">-</span>
          <div style="flex:1;width:100%;"></div>
          <div style="width:100%;height:1px;background:var(--color-border-tertiary);"></div>
          <span style="font-size:10px;color:var(--color-text-secondary);margin-top:3px;">${m}</span>
        </div>`;
      }
      const h = Math.round(d.total / max * BAR_H);
      const segs = [
        { key:'meta',   val:d.meta   },
        { key:'google', val:d.google },
        { key:'lineat', val:d.lineat },
        { key:'koubei', val:d.koubei },
        { key:'seo',    val:d.seo    },
        { key:'other',  val:d.other  },
      ].filter(s => s.val > 0).map(s =>
        `<div style="flex:${s.val};background:${colors[s.key]};"></div>`
      ).join('');
      return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:2px;">
        <span style="font-size:9px;color:var(--color-text-tertiary);line-height:1.3;text-align:center;">${fmt(d.total)}</span>
        <div style="flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;">
          <div style="width:100%;height:${h}px;display:flex;flex-direction:column;border-radius:3px 3px 0 0;overflow:hidden;">${segs}</div>
        </div>
        <div style="width:100%;height:1px;background:var(--color-border-tertiary);"></div>
        <span style="font-size:10px;color:var(--color-text-secondary);margin-top:3px;">${m}</span>
      </div>`;
    }).join('');

    const legKeys = [
      ['meta','Meta'], ['google','Google'], ['lineat','LINE@'],
      ['koubei','口碑'], ['seo','SEO'], ['other','其他']
    ];
    const legends = legKeys.map(([k,n]) =>
      `<span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--color-text-secondary);">
        <span style="width:9px;height:9px;border-radius:2px;background:${colors[k]};flex-shrink:0;${k==='other'?'border:0.5px solid var(--color-border-tertiary);':''}"></span>${n}</span>`
    ).join('');

    const ALL_MONTHS = kpiTrend.wo.labels;

    const totals = ALL_MONTHS.map((_,i) => woData[i] + qiData[i]);

      const wo = woData[i], qi = qiData[i], total = totals[i];

            <div style="flex:1;"></div><div style="flex:1;"></div>
          </div>
          <div style="display:flex;align-items:center;gap:2px;width:100%;margin-top:4px;">
            <div style="flex:1;height:1px;background:var(--color-border-tertiary);"></div>

            <div style="flex:1;height:1px;background:var(--color-border-tertiary);"></div>
          </div>
          <span style="font-size:10px;color:var(--color-text-secondary);margin-top:4px;">${m}</span>
        </div>`;
      return `
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;">
          <div style="display:flex;gap:3px;align-items:flex-end;width:100%;height:${BAR_H}px;">
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:2px;">
              <span style="font-size:8.5px;font-weight:500;color:#185FA5;white-space:nowrap;">${fmtK(wo)}</span>
              <div style="width:100%;height:${woH}px;background:#378ADD;border-radius:3px 3px 0 0;"></div>
            </div>
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:2px;">
              <span style="font-size:8.5px;font-weight:500;color:#993556;white-space:nowrap;">${fmtK(qi)}</span>

            </div>
          </div>
          <div style="display:flex;align-items:center;gap:2px;width:100%;margin-top:4px;">
            <div style="flex:1;height:1px;background:var(--color-border-tertiary);"></div>
            <span style="font-size:8.5px;color:var(--color-text-tertiary);white-space:nowrap;padding:0 2px;">${fmtFull(total)}</span>

          <span style="font-size:10px;color:var(--color-text-secondary);margin-top:4px;">${m}</span>
        </div>`;
    }).join('');

    return `<div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;margin-top:12px;">
      <div style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:12px;display:flex;align-items:center;gap:6px;">
        <span style="font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;background:var(--color-background-secondary);color:var(--color-text-secondary);">雙品牌合計</span>每月廣告花費

      <div style="display:flex;align-items:flex-end;gap:6px;height:${BAR_H+40}px;padding-bottom:4px;">${cols}</div>

}

(function() {
  const colors = {
    wo:['#2563eb','#60a5fa','#93c5fd','#dbeafe'],
    qi:['#9d174d','#db2777','#f9a8d4','#fce7f3']
  };
  document.getElementById('src-grid').innerHTML = ['wo','qi'].map(b=>{
    const s = srcData[b];
    const pcts = [s.mkt,s.biz,s.grp,s.other].map(v=>Math.round(v/s.total*100));
    const labels = ['廣告行銷','業務轉介','團購','其他'];
    const c = colors[b];
    const barSegs = [s.mkt,s.biz,s.grp,s.other].map((v,i)=>
      v>0?`<div style="width:${pcts[i]}%;background:${c[i]};"></div>`:''
    ).join('');
    const legendItems = labels.map((l,i)=>s[['mkt','biz','grp','other'][i]]>0?
      `<span><span class="src-dot" style="background:${c[i]};"></span>${l} ${[s.mkt,s.biz,s.grp,s.other][i]}人 (${pcts[i]}%)</span>`:''
    ).filter(x=>x).join('');
    return `<div class="src-card2">
      <div style="font-size:13px;font-weight:600;">${btag(b)}新客 ${s.total} 人</div>
      <div class="src-bar2">${barSegs}</div>
      <div class="src-legend2">${legendItems}</div>
    </div>`;
  }).join('');
  const totalMkt = srcData.wo.mkt + srcData.qi.mkt;
  const totalAll = srcData.wo.total + srcData.qi.total;
  document.getElementById('src-footer').innerHTML =
    `<span>合計新客 <strong style="color:#1a1a18;font-size:14px;">${totalAll}</strong> 人</span>
     <span>廣告新客 <strong style="color:#1a1a18;">${totalMkt}</strong> 人 (${Math.round(totalMkt/totalAll*100)}%)</span>
     <span>非行銷預算 <strong style="color:#1a1a18;">${totalAll-totalMkt}</strong> 人 (${Math.round((totalAll-totalMkt)/totalAll*100)}%)</span>`;
})();


// ── Budget ────────────────────────────────────────────────
(function() {
  const bd = D.budget;
  const combined = bd.wo_ytd + bd.qi_ytd;
  const usedPct  = pN(combined, bd.total);
  const timePct  = Math.round((new Date().getMonth() + 1) / 12 * 100);
  const diff = usedPct - timePct;
  const dTxt = diff > 0 ? `消耗高於時間進度 ${diff}%` : diff < 0 ? `消耗低於時間進度 ${Math.abs(diff)}%` : '消耗與時間進度一致';
  const dCls = diff > 5 ? 'diff-low' : 'diff-ok';
  document.getElementById('budget').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="font-weight:600;font-size:14px;">2026 年度廣告預算（原渥＋原綺合計）</span>
      <span style="font-size:13px;font-weight:600;color:#185FA5;">NT$ 600 萬</span>
    </div>
    <div class="grid3" style="margin-bottom:12px;">
      <div class="kpi">
        <div class="kpi-label">已使用（1–5月）</div>
        <div class="kpi-value" style="color:#185FA5;">${fmtM(combined)}</div>
        <div class="kpi-sub">原渥 ${fmtM(bd.wo_ytd)} ／ 原綺 ${fmtM(bd.qi_ytd)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">剩餘預算</div>
        <div class="kpi-value">${fmtM(bd.total - combined)}</div>
        <div class="kpi-sub">可用金額</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">預算使用率</div>
        <div class="kpi-value">${usedPct}%</div>
        <div class="kpi-sub">時間進度 ${timePct}%</div>
      </div>
    </div>
    <div class="muted" style="margin-bottom:3px;font-size:11px;">預算消耗進度</div>
    <div class="bar-bg-lg"><div class="bar-fill bar-blue" style="width:${cl(usedPct,0,100)}%"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:4px;">
      <span class="muted">已用 ${usedPct}%</span>
      <span class="${dCls}" style="font-size:11px;">${dTxt}</span>
    </div>`;
})();


// ── Media ─────────────────────────────────────────────────
['wo','qi'].forEach(b => {
  const d = D.media[b];
  const cpl = d.clients ? Math.round(d.total / d.clients) : 0;
  document.getElementById(`media-${b}`).innerHTML = `
    <div class="brand-blk-hdr">
      ${btag(b)}
      <span class="muted" style="font-size:11px;">${d.note}</span>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th>媒體</th><th class="r">花費</th><th class="r">佔比</th>
      </tr></thead>
      <tbody>
        ${d.channels.map(c=>`<tr>
          <td>${c.name}</td>
          <td class="r">${fmtM(c.val)}</td>
          <td class="r" style="color:#888780;">${pN(c.val,d.total)}%</td>
        </tr>`).join('')}
        <tr class="total-row">
          <td>合計</td><td class="r">${fmtM(d.total)}</td><td class="r">100%</td>
        </tr>
      </tbody>
    </table></div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <div class="kpi" style="flex:1;">
        <div class="kpi-label">新客／到診</div>
        <div class="kpi-value" style="font-size:14px;">${fmt(d.clients)}</div>
      </div>
      <div class="kpi" style="flex:1;">
        <div class="kpi-label">CPL</div>
        <div class="kpi-value" style="font-size:14px;">${fmtM(cpl)}</div>
      </div>
    </div>
    <div class="note">＊媒體明細為1–4月累計；5月總花費已計入預算進度</div>`;
});
</script>
</body>
</html>
