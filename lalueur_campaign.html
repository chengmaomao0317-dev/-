<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原渥集團｜活動成效統計</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;background:#f5f7fa;color:#1e293b;min-height:100vh}

/* ── Header ── */
.header{background:#000;padding:14px 32px;border-bottom:1px solid #1a1a1a}
.header-inner{display:flex;align-items:center;gap:18px}
.logo-svg{height:52px;width:auto;flex-shrink:0}
.header-divider{width:1px;height:42px;background:#2a2a2a;flex-shrink:0}
.header-text .header-title{font-size:16px;font-weight:700;color:#e5e7eb;letter-spacing:.3px}
.header p{font-size:11px;color:#4b5563;margin-top:3px}

/* ── Filters ── */
.filters{padding:14px 32px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.filter-label{font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.pill{display:inline-flex;align-items:center;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s;white-space:nowrap;margin:2px}
.pill:hover{opacity:.8}
/* Date filter row */
.date-bar{padding:10px 32px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.dq-btn{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e2e8f0;background:#f8fafc;color:#475569;transition:all .15s;white-space:nowrap}
.dq-btn:hover{background:#f1f5f9}
.dq-btn.active{background:#eff6ff;color:#2563eb;border-color:#bfdbfe}
.date-inputs{display:flex;align-items:center;gap:6px;margin-left:4px}
.act-filter-sel{font-size:12px;font-weight:600;padding:5px 10px;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#475569;cursor:pointer;outline:none;min-width:180px;height:30px}
.act-filter-sel:focus{border-color:#bfdbfe;background:#eff6ff;color:#2563eb}
.date-inputs input[type=date]{padding:4px 8px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;color:#1e293b;background:#fff;cursor:pointer;outline:none}
.date-inputs input[type=date]:focus{border-color:#bfdbfe}
.date-sep{font-size:12px;color:#94a3b8}
/* Upload button (in date bar) */
.print-btn{padding:5px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,#64748b,#475569);color:#fff;transition:all .2s;white-space:nowrap;box-shadow:0 1px 4px rgba(100,116,139,.3)}
.print-btn:hover{opacity:.9}
.print-btn:active{transform:translateY(1px)}
@media print{
  .header,.month-rail,.dq-wrap,.date-wrap,.print-btn,#timeline-back,.tab-bar{display:none!important}
  .page-body{display:block!important}
  .main-area{width:100%!important;padding:0!important}
  .activity-group{break-inside:avoid;margin-bottom:12px}
  .act-section{break-inside:avoid}
  .group-body,.act-body{display:block!important}
  body{background:#fff!important;color:#000!important}
  .brand-header{background:#f1f5f9!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* ── Page body: month rail + main area ── */
.page-body{display:flex;align-items:flex-start}



/* ── Main area (right of rail) ── */
.main-area{flex:1;min-width:0}


/* ── Content ── */
.content{padding:0 28px 40px}

/* ── Brand section header (collapsible) ── */
.brand-header{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-radius:14px;cursor:pointer;user-select:none;border:1px solid;margin:20px 0 4px;transition:filter .15s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.brand-header:hover{filter:brightness(.97)}
.bh-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.bh-title{font-size:15px;font-weight:800}
.bh-date{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.bh-right{display:flex;align-items:center;gap:14px}
.bh-cnt{font-size:11px;font-weight:600;white-space:nowrap}
.bh-chev{font-size:12px;color:#94a3b8;transition:transform .25s;flex-shrink:0}
.bh-chev.open{transform:rotate(180deg)}
/* 原渥 palette */
.bh-yuanwo{background:linear-gradient(135deg,#f0f7ff,#dbeafe);border-color:#93c5fd}
.bh-yuanwo .bh-title{color:#1e40af}
.bh-yuanwo .bh-date{background:#bfdbfe;color:#1e3a8a}
.bh-yuanwo .bh-cnt{color:#2563eb}
/* 原綺 palette */
.bh-yuanqi{background:linear-gradient(135deg,#fdf2f8,#fce7f3);border-color:#f9a8d4}
.bh-yuanqi .bh-title{color:#9d174d}
.bh-yuanqi .bh-date{background:#fbcfe8;color:#831843}
.bh-yuanqi .bh-cnt{color:#db2777}

/* ── Store pill separator ── */
.store-sep{width:1px;height:20px;background:#e2e8f0;display:inline-block;margin:0 4px;vertical-align:middle}

/* ── Group ── */
.activity-group{margin-top:12px;border:1px solid #e2e8f0;border-radius:14px;overflow:clip;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.group-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#f8fafc;cursor:pointer;user-select:none;transition:background .15s;border-bottom:1px solid #e2e8f0}
.group-header:hover{background:#f1f5f9}
.group-header-left{display:flex;align-items:center;gap:12px}
.group-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.gi-w{background:linear-gradient(135deg,#0ea5e9,#6366f1)}
.gi-t{background:linear-gradient(135deg,#ec4899,#f43f5e)}
.gi-j{background:linear-gradient(135deg,#10b981,#059669)}
.gi-e{background:linear-gradient(135deg,#f97316,#ea580c)}
.gi-l{background:linear-gradient(135deg,#9333ea,#7c3aed)}
.gi-b{background:linear-gradient(135deg,#eab308,#ca8a04)}
.gi-s{background:linear-gradient(135deg,#fbbf24,#f97316)}
.gi-a{background:linear-gradient(135deg,#06b6d4,#0891b2)}
.group-title{font-size:15px;font-weight:700;color:#1e293b}
.group-subtitle{font-size:11px;color:#94a3b8;margin-top:2px}
.gs-wrap{display:flex;gap:20px;align-items:center}
.gs-item{text-align:right}.gs-v{font-size:14px;font-weight:700}.gs-l{font-size:10px;color:#94a3b8}
.chev{font-size:12px;color:#94a3b8;transition:transform .25s}.chev.open{transform:rotate(180deg)}
.group-body{display:none}.group-body.open{display:block}

/* ── Activity section ── */
.act-section{border-top:2px solid #e2e8f0}
.act-section:first-child{border-top:none}
.act-header{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;cursor:pointer;user-select:none;transition:background .15s}
.act-header:hover{background:#f8fafc}
.act-header-left{display:flex;align-items:center;gap:12px}
/* Price badge */
.aprice{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:800;white-space:nowrap;letter-spacing:-.2px}
.aname{font-size:14px;font-weight:700;color:#1e293b}
.aqswrap{display:flex;gap:16px;align-items:center}
.aqs{text-align:right}.aqs .v{font-size:13px;font-weight:700}.aqs .l{font-size:10px;color:#94a3b8}
.achev{font-size:10px;color:#94a3b8;transition:transform .2s;margin-left:8px}.achev.open{transform:rotate(180deg)}
.act-body{display:none;background:#f8fafc;border-top:1px solid #f1f5f9}.act-body.open{display:block}

/* ── Stats top bar ── */
.stats-topbar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;border-bottom:1px solid #e2e8f0;background:#fff}
.stb-cell{padding:16px 20px;text-align:center;border-right:1px solid #e2e8f0}
.stb-cell:last-child{border-right:none}
.stb-lbl{font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stb-val{font-size:28px;font-weight:800;margin-top:6px;line-height:1}
.stb-sub{font-size:11px;color:#94a3b8;margin-top:4px}

/* ── Two-column body ── */
.act-inner{display:grid;grid-template-columns:220px 1fr;gap:0;min-height:150px}
.act-left{padding:20px;border-right:1px solid #e2e8f0}
.act-right{padding:16px 20px}

/* ── Ratio section ── */
.ratio-title{font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.ratio-item{margin-bottom:12px}
.ratio-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.ratio-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ratio-lbl{font-size:13px;font-weight:700}
.ratio-cnt{font-size:12px;color:#94a3b8;margin-left:auto}
.ratio-bar-bg{height:8px;border-radius:4px;background:#e2e8f0;overflow:hidden;margin-top:2px}
.ratio-fill{height:100%;border-radius:4px}
.r-new{background:linear-gradient(90deg,#78350f,#92400e)}.r-old{background:linear-gradient(90deg,#374151,#6b7280)}
.total-box{margin-top:18px;padding-top:14px;border-top:1px solid #e2e8f0}
.total-box-lbl{font-size:11px;color:#94a3b8;font-weight:600}
.total-box-val{font-size:20px;font-weight:800;color:#1e293b;margin-top:4px}

/* ── Store table ── */
.tbl-title{font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.twrap{border-radius:10px;border:1px solid #e2e8f0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.stbl{width:100%;border-collapse:collapse;font-size:12px;min-width:520px}
.stbl th{background:#f8fafc;color:#94a3b8;font-weight:600;padding:8px 12px;text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #e2e8f0;cursor:pointer;user-select:none;white-space:nowrap;vertical-align:middle}
.stbl th:hover{color:#2563eb;background:#eff6ff}
.stbl th.sort-desc::after{content:' ↓';opacity:.7}
.stbl th.sort-asc::after{content:' ↑';opacity:.7}
.stbl td{padding:9px 12px;border-top:1px solid #f1f5f9;text-align:center;color:#475569;vertical-align:middle}
.stbl td:first-child{text-align:left;font-weight:600;color:#1e293b;white-space:nowrap}
.stbl .trow{background:#1a1a1a;font-weight:700}
.stbl .trow td{color:#f9fafb;border-top:2px solid #000}
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px}
.tn{color:#92400e;font-weight:600}.to{color:#374151;font-weight:600}
.td2{color:#10b981;font-weight:600}.te{color:#f59e0b;font-weight:600}.tt{color:#1e293b;font-weight:700}

/* ── Activity description (shown in header) ── */
.aname-desc{font-size:11px;color:#78716c;margin-top:5px;line-height:1.55;max-width:560px}

/* ── #brand-bar: shown above summary cards when single-brand view ── */
#brand-bar{padding:8px 28px 0;display:none}
#brand-bar.show{display:block}
#brand-bar .brand-header{margin:0;cursor:default}
#brand-bar .brand-header:hover{filter:none}

@media(max-width:1000px){
  .act-inner{grid-template-columns:1fr}
  .act-left{border-right:none;border-bottom:1px solid #e2e8f0}
  .act-right{padding:12px 8px}
  .stats-topbar{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .stb-cell{min-width:100px;flex-shrink:0}
  .content{padding-left:12px;padding-right:12px}
  .filters{padding:12px 16px}
  .twrap{border-radius:8px}
  .stbl{min-width:480px}
}

/* ── Tab bar ── */
.sticky-top{position:sticky;top:0;z-index:50;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;padding:0 24px}
.tab-btn{padding:13px 22px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:#94a3b8;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;letter-spacing:.2px}
.tab-btn:hover{color:#475569;background:#f8fafc}
.tab-btn.active{color:#2563eb;border-bottom-color:#2563eb}

/* ── Gantt / Timeline tab ── */
.gantt-wrap{padding:20px 28px 48px}
.gantt-title{font-size:16px;font-weight:800;color:#1e293b;margin-bottom:4px}
.gantt-subtitle{font-size:12px;color:#94a3b8;margin-bottom:20px}
.gantt-legend{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0}
.gantt-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#374151}
.gantt-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.gantt-outer{overflow-x:auto;border:1px solid #e2e8f0;border-radius:14px;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.gantt-inner{min-width:700px}
.gantt-head{display:flex;background:#f8fafc;border-bottom:2px solid #e2e8f0;position:sticky;top:0;z-index:5}
.gantt-name-hdr{width:210px;min-width:210px;padding:10px 14px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;border-right:1px solid #e2e8f0;position:sticky;left:0;z-index:8;background:#f8fafc}
.gantt-timeline-hdr{flex:1;position:relative;height:48px}
.gantt-month-tick{position:absolute;top:0;bottom:0;display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:8px;pointer-events:none}
.gantt-month-tick .yr{font-size:9px;font-weight:600;color:#94a3b8;line-height:1}
.gantt-month-tick .mo{font-size:11px;font-weight:800;color:#475569;line-height:1;margin-top:2px}
.gantt-vline{position:absolute;top:0;bottom:0;width:1px;background:#e2e8f0}
.gantt-brand-hdr{display:flex;align-items:center;border-bottom:1px solid #e2e8f0}
.gantt-brand-hdr-name{width:210px;min-width:210px;padding:8px 14px;border-right:1px solid #e2e8f0;position:sticky;left:0;z-index:3}
.gantt-brand-pill{font-size:12px;font-weight:800;color:#fff;padding:3px 12px;border-radius:20px;display:inline-block}
.gantt-brand-hdr-bar{flex:1;position:relative;height:34px}
.gantt-row{display:flex;align-items:center;border-bottom:1px solid #f1f5f9}
.gantt-row:last-child{border-bottom:none}
.gantt-row-name{width:210px;min-width:210px;font-size:12px;font-weight:600;color:#374151;padding:0 8px 0 10px;border-right:1px solid #f1f5f9;height:32px;display:flex;align-items:center;gap:4px;position:sticky;left:0;z-index:3;background:#fff;cursor:pointer;user-select:none}
.gantt-row-bar{flex:1;position:relative;height:32px}
.gantt-bar{position:absolute;height:20px;top:6px;border-radius:6px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:700;color:rgba(255,255,255,.92);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.15);gap:2px}
.gantt-bar-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.gantt-bar-date{font-size:9px;flex-shrink:0;opacity:.9;white-space:nowrap;font-weight:600}
.gantt-ongoing-arrow{flex-shrink:0;margin-left:1px;opacity:.8}
.gantt-expand-icon{font-size:10px;color:#94a3b8;flex-shrink:0;width:14px;user-select:none}
.gantt-name-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gantt-jump-btn{flex-shrink:0;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;border:1.5px solid #bfdbfe;background:#eff6ff;color:#2563eb;cursor:pointer;white-space:nowrap;transition:all .15s;line-height:1.6}
.gantt-brand-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.gantt-brand-filter-label{font-size:11px;color:#94a3b8;font-weight:600;margin-right:4px}
.gbf-btn{padding:4px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid;transition:all .15s;background:#fff;white-space:nowrap}
.gbf-btn[data-brand="all"]{border-color:#64748b;color:#64748b}
.gbf-btn[data-brand="all"].active{background:#64748b;color:#fff}
.gbf-btn[data-brand="原綺"]{border-color:#ec4899;color:#ec4899}
.gbf-btn[data-brand="原綺"].active{background:#ec4899;color:#fff}
.gbf-btn[data-brand="原渥"]{border-color:#2563eb;color:#2563eb}
.gbf-btn[data-brand="原渥"].active{background:#2563eb;color:#fff}
.gbf-btn[data-brand="產品"]{border-color:#059669;color:#059669}
.gbf-btn[data-brand="產品"].active{background:#059669;color:#fff}
.gantt-jump-btn:hover{background:#dbeafe;border-color:#93c5fd}
.act-period-btn{font-size:12px;font-weight:700;padding:5px 14px;border-radius:8px;border:none;background:linear-gradient(135deg,#1a1a1a,#374151);color:#fff;cursor:pointer;white-space:nowrap;transition:all .15s;line-height:1.6;box-shadow:0 1px 6px rgba(0,0,0,.3)}
.act-period-btn:hover{background:linear-gradient(135deg,#000,#1a1a1a);box-shadow:0 2px 10px rgba(0,0,0,.4);transform:translateY(-1px)}
.gantt-detail-row{display:block;background:#fafafa;border-bottom:1px solid #f1f5f9;padding:7px 20px 9px 26px;font-size:11px;color:#475569;line-height:1.75}
.gantt-detail-desc{margin-bottom:6px}
.group-pr{font-size:10px;color:#94a3b8;font-weight:400;margin-left:6px;vertical-align:middle}
.anc{font-size:10.5px;color:#64748b;margin-top:2px}
.gantt-sub-list{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.gantt-sub-row{display:flex;align-items:center;gap:8px;padding:4px 8px;background:#f1f5f9;border-radius:6px;border-left:3px solid #ec4899}
.gantt-sub-name{font-weight:600;color:#1e293b;min-width:140px;font-size:11px}
.gantt-sub-desc{flex:1;color:#64748b;font-size:10.5px}
/* ── Back-to-timeline bar ── */
#timeline-back{display:none;position:fixed;bottom:28px;right:28px;z-index:300;background:#fff;border:2px solid #93c5fd;border-radius:28px;padding:10px 18px 10px 14px;box-shadow:0 6px 24px rgba(59,130,246,.22);align-items:center;gap:10px;white-space:nowrap;animation:tbSlideUp .22s ease}
#timeline-back.show{display:flex}
@keyframes tbSlideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.back-btn{font-size:13px;font-weight:800;padding:0;border:none;background:transparent;color:#2563eb;cursor:pointer;letter-spacing:.2px}
.back-btn:hover{text-decoration:underline}
.back-hint{font-size:11px;color:#93c5fd;padding-left:4px;border-left:1.5px solid #bfdbfe}
.gantt-row:hover .gantt-row-name{background:#f8fafc}.gantt-row:hover .gantt-row-bar{background:rgba(0,0,0,.01)}
.gantt-bar.ongoing{border-radius:6px 2px 2px 6px}
.gantt-today{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;border-radius:1px;z-index:10}
.gantt-today-lbl{position:absolute;top:2px;left:3px;font-size:9px;font-weight:700;color:#ef4444;white-space:nowrap}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <svg class="logo-svg" viewBox="0 0 260 56" xmlns="http://www.w3.org/2000/svg">
      <text x="130" y="36" font-family="-apple-system,'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="34" fill="#ffffff" text-anchor="middle" letter-spacing="1">LA LUEUR</text>
      <text x="130" y="52" font-family="'PingFang TC','Microsoft JhengHei',sans-serif" font-weight="300" font-size="11" fill="#9ca3af" text-anchor="middle" letter-spacing="9">原 渥 集 團</text>
    </svg>
    <div class="header-divider"></div>
    <div class="header-text">
      <div class="header-title">活動成效統計</div>
      <p id="hsub">載入中…</p>
    </div>
  </div>
</div>
<div class="sticky-top">
<div class="tab-bar">
  <button class="tab-btn active" data-tab="stats" onclick="switchTab('stats')">📊 成效統計</button>
  <button class="tab-btn" data-tab="timeline" onclick="switchTab('timeline')">📅 活動走期</button>
</div>
<div id="timeline-back">
  <button class="back-btn" onclick="switchTab('timeline')">← 返回活動走期</button>
  <span class="back-hint" id="back-hint-text"></span>
</div>
<div id="stats-bar">
<div class="filters">
  <span class="filter-label">門市</span>
  <div id="sp"></div>
</div>

// Assign competition ranks (1,1,3 style) — primary: 組數 desc, secondary: 成交+衍伸 desc
function mkRankMap(arr){
  // arr: [{s, tg, t2}, ...] already filtered (tg>0)
  // sort: primary tg desc, tiebreak t2 desc
  const sorted=[...arr].sort((a,b)=>b.tg!==a.tg?b.tg-a.tg:b.t2-a.t2);
  const map={};
  let rank=1;
  sorted.forEach((item,i)=>{
    if(i>0){
      const prev=sorted[i-1];
      if(item.tg!==prev.tg) rank=i+1; // same 組數 = same rank regardless of revenue
    }
    map[item.s]=rank;
  });
  return map;
}

// ─── Aggregate 原渥 ───────────────────────────────────────────────────────
function ca(data,key){
  const rows=data.filter(r=>r.activity===key);
  const bs={};ST.forEach(s=>bs[s]={g:0,n:0,o:0,d:0,e:0});
  rows.forEach(r=>{const b=bs[r.store];b.g++;r.client_type==='新客'?b.n++:b.o++;b.d+=r.act_price;b.e+=Math.max(0,r.ext_revenue);});
  const t={g:0,n:0,o:0,d:0,e:0};
  ST.forEach(s=>Object.keys(t).forEach(k=>t[k]+=bs[s][k]));
  return{bs,t};
}

function ca2(key){

  if(yqRows.length>0){
    // 每筆帶 date，支援日期過濾

      (SS==='全集團'||SS==='原綺全門市'||r.store===SS)&&
      (SM==='全部'||r.month===SM)&&
      (!SD||r.date>=SD)&&
      (!ED||r.date<=ED)
    );
    const bs={};YQS.forEach(s=>bs[s]={g:0,n:0,o:0,d:0,e:0});
    filtered.forEach(r=>{if(bs[r.store]){const b=bs[r.store];b.g++;r.client_type==='新客'?b.n++:b.o++;b.d+=r.act_price;b.e+=Math.max(0,r.ext_revenue);}});
    const stores=(SS==='全集團'||SS==='原綺全門市')?YQS:(YQS.includes(SS)?[SS]:[]);
    const t={g:0,n:0,o:0,d:0,e:0};
    stores.forEach(s=>Object.keys(t).forEach(k=>t[k]+=bs[s][k]));
    return{bs,t,stores};
  }
  // 無個別筆記錄：沿用 YQ_AGG（整體累計，日期只做顯示/隱藏）
  const dr=YQ_DR[key]||{s:'2026-04-15',e:'2026-05-20'};
  const outOfRange=SD&&ED&&(ED<dr.s||SD>dr.e);
  const base=outOfRange?{}:(YQ_AGG[key]||{});
  const bs={};
  YQS.forEach(s=>bs[s]=Object.assign({g:0,n:0,o:0,d:0,e:0},base[s]||{}));
  const stores=(SS==='全集團'||SS==='原綺全門市')?YQS:(YQS.includes(SS)?[SS]:[]);
  const t={g:0,n:0,o:0,d:0,e:0};
  stores.forEach(s=>Object.keys(t).forEach(k=>t[k]+=bs[s][k]));
  return{bs,t,stores};
}

// Aggregate 原渥 historical pre-aggregated data
function ca_hist(key){
  const dr=RW_HIST_DR[key]||{};
  const outOfRange=dr.s&&SD&&ED&&(ED<dr.s||SD>dr.e);
  const base=outOfRange?{}:(RW_HIST[key]||{});
  // Build bs with full store names (SS uses '站前店'; RW_HIST uses '站前')
  const bs={};
  RW_ST.forEach(s=>{bs[s+'店']=Object.assign({g:0,n:0,o:0,d:0,e:0},base[s]||{});});
  const storesFull=(SS==='全集團'||SS==='原渥全門市')?RW_ST.map(s=>s+'店'):(ST.includes(SS)?[SS]:[]);
  const t={g:0,n:0,o:0,d:0,e:0};
  storesFull.forEach(s=>Object.keys(t).forEach(k=>t[k]+=bs[s][k]||0));
  return{bs,t,stores:storesFull};
}

  const _prM=act.pr?act.pr.match(/(\d{4})\/(\d{2})\/(\d{2}).*?(\d{4})\/(\d{2})\/(\d{2})/):null;
  const _pSD=_prM?_prM[1]+'-'+_prM[2]+'-'+_prM[3]:null;

  }

  const topbarCols=hasFinancial?'repeat(5,1fr)':'repeat(3,1fr)';

  const _rkM=mkRankMap(_rkArr);
  const _sortedSt=[...stores].sort((a,b)=>(bs[b]?.g||0)-(bs[a]?.g||0));
  const sr=_sortedSt.map(s=>{
    const b=bs[s];if(!b||!b.g)return'';

  return'<div class="act-section">'
    +'<div class="act-header" onclick="tA(\''+id+'\')">'

function weekStart(offset=0){const d=new Date();const day=d.getDay()||7;d.setDate(d.getDate()-day+1+offset*7);return d.toISOString().slice(0,10);}
function weekEnd(offset=0){const d=new Date(weekStart(offset));d.setDate(d.getDate()+6);return d.toISOString().slice(0,10);}
function monthStart(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01';}

function printDashboard(){
  // Expand all groups before printing so nothing is hidden
  const allGroupBodies=document.querySelectorAll('.group-body,.act-body');
  const hiddenItems=[];
  allGroupBodies.forEach(el=>{
    if(!el.classList.contains('open')){
      hiddenItems.push(el);

  });

// ─── Sortable table ───────────────────────────────────────────────────────
function sortTbl(th){
  const ths=Array.from(th.closest('tr').querySelectorAll('th'));
  const col=ths.indexOf(th);
  const tbody=th.closest('table').querySelector('tbody');
  const rows=Array.from(tbody.rows);
  const totalRow=rows[rows.length-1];
  const dataRows=rows.slice(0,-1);
  const wasDesc=th.classList.contains('sort-desc');
  const asc=wasDesc;
  ths.forEach(h=>h.classList.remove('sort-asc','sort-desc'));
  th.classList.add(asc?'sort-asc':'sort-desc');
  dataRows.sort((a,b)=>{
    const av=a.cells[col]?.dataset.v??'';
    const bv=b.cells[col]?.dataset.v??'';
    const an=parseFloat(av);const bn=parseFloat(bv);
    const num=!isNaN(an)&&!isNaN(bn);
    const r=num?an-bn:av.localeCompare(bv,'zh-TW');
    return asc?r:-r;
  });
  dataRows.forEach(r=>tbody.appendChild(r));
  tbody.appendChild(totalRow);
}

function _setMonth(mo){
  CUR_MO=mo;
  if(!mo){SM='全部';SD='';ED='';}
  else{

// ─── Brand section toggle ─────────────────────────────────────────────────
function tBrand(b){
  const body=document.getElementById('brand-'+b+'-body');
  const chev=document.getElementById('bd-chev-'+b);
  if(!body)return;
  const isOpen=body.style.display!=='none';
  body.style.display=isOpen?'none':'';
  if(chev)chev.classList.toggle('open',!isOpen);
}

// ─── Toggle helpers ───────────────────────────────────────────────────────
function tG(k){
  const b=document.getElementById('gb-'+k),c=document.getElementById('cg-'+k);
  if(!b)return;const o=b.classList.contains('open');b.classList.toggle('open',!o);c.classList.toggle('open',!o);
}
function tA(id){
  const b=document.getElementById(id),c=document.getElementById('ac-'+id);
  if(!b)return;const o=b.classList.contains('open');b.classList.toggle('open',!o);c.classList.toggle('open',!o);
}

// ─── Build Gantt timeline ─────────────────────────────────────────────────────
// ─── Google Sheets → Gantt auto-update ───────────────────────────────────────
const GS_CSV_URL='https://docs.google.com/spreadsheets/d/1_Yo9nLhdpCbQlmcEN-uorLJnLL9vV_foOIQaI9lROkg/export?format=csv&gid=1644518075';
const LS_KEY='gantt_cache_v4';  // bump version to clear stale cache
const LS_DATE_KEY='gantt_cache_date_v4';
const BRAND_DEFAULT_COLOR={'原綺':'#ec4899','原渥':'#3b82f6','產品':'#10b981','線上通路':'#059669'};
function _parseGanttCSV(csv){
  // ── RFC-4180 compliant CSV parser: handles \r\n, multi-line quoted fields ──
  function parseCsvToRows(text){
    const rows=[];let row=[];let cur='';let inQ=false;
    for(let i=0;i<text.length;i++){
      const ch=text[i];
      if(inQ){
        if(ch==='"'){
          if(i+1<text.length&&text[i+1]==='"'){cur+='"';i++;}  // escaped ""
          else inQ=false;
        } else cur+=ch;
      } else {
        if(ch==='"'){inQ=true;}
        else if(ch===','){row.push(cur.trim());cur='';}
        else if(ch==='\r'||ch==='\n'){
          if(ch==='\r'&&i+1<text.length&&text[i+1]==='\n')i++;
          row.push(cur.trim());cur='';
          if(row.length&&row.some(f=>f!=='')){rows.push(row);}
          row=[];
        } else cur+=ch;
      }
    }
    if(cur!==''||row.length){row.push(cur.trim());if(row.some(f=>f!==''))rows.push(row);}
    return rows;
  }
  const allRows=parseCsvToRows(csv);
  if(allRows.length<2)return null;

  // ── Find header row (scan first 5 rows for one containing 品牌 or 活動) ──
  const MONTH_HDRS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  let hdrIdx=0;
  let headers=allRows[0];
  for(let ri=0;ri<Math.min(5,allRows.length);ri++){
    const r=allRows[ri];
    if(r.some(h=>['品牌','brand','活動名稱','活動','name'].includes(h))||r.some(h=>MONTH_HDRS.includes(h))){
      headers=r;hdrIdx=ri;break;
    }
  }

  const monthCols=MONTH_HDRS.map(m=>headers.indexOf(m));
  const hasMonthCols=monthCols.some(c=>c>=0);
  // ── Flexible column detection ──
  const iB=headers.findIndex(h=>['品牌','brand','Brand'].includes(h));
  const iA=headers.findIndex(h=>['活動名稱','活動名称','活動','name','Name','活動/課程'].includes(h));
  const iD=headers.findIndex(h=>['內容','說明','備註','描述','description','說明/備註'].includes(h));
  if(iB<0||iA<0){
    console.warn('Gantt CSV: 找不到品牌或活動名稱欄，headers=',headers);
    return null;
  }

  // ── Parse short date "25/12/1"→"2025-12-01", "5/28"→"2026-05-28" ──
  const pd=s=>{
    s=(s||'').replace(/["'＊\s]/g,'').trim();
    if(!s)return null;
    const p=s.split('/');
    if(p.length===3){let y=parseInt(p[0]);if(y<100)y+=2000;const m=parseInt(p[1]),d=parseInt(p[2]);if(isNaN(y)||isNaN(m)||isNaN(d))return null;return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
    if(p.length===2){const m=parseInt(p[0]),d=parseInt(p[1]);if(isNaN(m)||isNaN(d))return null;return`2026-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
    return null;
  };
  // ── Parse date-range cell "1/5-2/28", "25/12/1-26/2/28", "4/1起" ──
  const parseDateCell=cell=>{
    cell=(cell||'').replace(/["']/g,'').trim();
    if(!cell)return null;
    if(cell.endsWith('起')){const s=pd(cell.slice(0,-1));return s?{s,e:'2026-12-31'}:null;}
    // Find the dash between two slash-containing date tokens
    // e.g. "25/12/1-26/2/28" → split at '-' giving ["25/12/1","26/2/28"]
    // e.g. "3/1-3/31" → ["3/1","3/31"]
    const parts=cell.split('-');
    if(parts.length<2)return null;
    const s=pd(parts[0]);
    const e=pd(parts.slice(1).join('-'));
    return(s&&e)?{s,e}:null;
  };

  const result=[];
  let lastBrand='';let lastAct='';
  for(let r=hdrIdx+1;r<allRows.length;r++){
    const row=allRows[r];
    const rawBrand=(row[iB]||'').trim();
    const rawAct=(row[iA]||'').trim();
    const brand=rawBrand||lastBrand;
    if(rawBrand)lastBrand=rawBrand;
    if(!lastBrand)continue;
    const act=rawAct||lastAct;
    if(rawAct)lastAct=rawAct;
    if(!act)continue;
    const desc=iD>=0?(row[iD]||'').trim():'';
    const color=BRAND_DEFAULT_COLOR[lastBrand]||'#6366f1';
    if(hasMonthCols){
      for(let mi=0;mi<MONTH_HDRS.length;mi++){
        const ci=monthCols[mi];
        if(ci<0||ci>=row.length)continue;
        const cell=(row[ci]||'').trim();
        if(!cell)continue;
        const range=parseDateCell(cell);
        if(!range)continue;
        result.push({b:lastBrand,a:act,s:range.s,e:range.e,c:color,d:desc,gid:null,actKey:null});
      }
    } else {
      const iS=headers.findIndex(h=>['開始日期','開始','start','Start'].includes(h));
      const iE=headers.findIndex(h=>['結束日期','結束','end','End'].includes(h));
      if(iS<0||iE<0)continue;
      const s=(row[iS]||'').replace(/\//g,'-').trim();
      const e=(row[iE]||'').replace(/\//g,'-').trim();
      if(!s||!e)continue;
      result.push({b:lastBrand,a:act,s,e,c:color,d:desc,gid:null,actKey:null});
    }
  }
  console.log('Gantt CSV parsed:',result.length,'activities. Sample:',(result[0]||{}).a,'headers:',headers.slice(0,6));
  return result.length?result:null;
}
async function _fetchGanttData(){
  // Clear old cache versions to avoid stale/corrupt data
  ['gantt_cache','gantt_cache_date','gantt_cache_v2','gantt_cache_date_v2',
   'gantt_cache_v3','gantt_cache_date_v3'].forEach(k=>localStorage.removeItem(k));
  const today=new Date().toISOString().slice(0,10);
  const cached=localStorage.getItem(LS_KEY);
  const cachedDate=localStorage.getItem(LS_DATE_KEY);
  if(cached&&cachedDate===today){
    try{
      const d=JSON.parse(cached);
      // Validate: reject if any activity name looks like a raw CSV row (contains commas)
      if(d&&d.length&&d.every(r=>r.a&&!r.a.includes(','))){
        console.log('Gantt: using cached data ('+d.length+' rows)');return d;
      }
      console.warn('Gantt: cached data looks corrupt, re-fetching');
      localStorage.removeItem(LS_KEY);
    }catch(e){}
  }
  try{
    const resp=await fetch(GS_CSV_URL,{cache:'no-cache'});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const csv=await resp.text();
    const parsed=_parseGanttCSV(csv);
    if(parsed&&parsed.every(r=>r.a&&!r.a.includes(','))){
      localStorage.setItem(LS_KEY,JSON.stringify(parsed));
      localStorage.setItem(LS_DATE_KEY,today);
      console.log('Gantt: fetched '+parsed.length+' rows from Google Sheets');
      return parsed;
    }
    if(parsed)console.warn('Gantt: parsed data has comma-in-names, discarding. Check GS column headers.');
  }catch(err){console.warn('Gantt fetch failed:',err.message);}
  return null;
}

// Normalize: strip spaces, full-width parens, brackets, lowercased
function _norm(s){return(s||'').trim().replace(/\s+/g,'').replace(/[（）()【】「」]/g,'');}

// Brand-aware lookup: overrides → exact normalized → best prefix (3+ chars)
function _lookupGid(name,brand){
  const n=_norm(name);if(!n)return null;
  // 1. Manual overrides (brand-specific)
  for(const[b,k,v]of _GID_OVERRIDES){if(b===brand&&_norm(k)===n)return v;}
  // 2. Hardcoded TIMELINE entries for this brand
  const bList=_GID_MAP_BY_BRAND[brand]||[];
  for(const{k,v}of bList){if(_norm(k)===n)return v;}
  // 3. Best prefix match (longest match wins; tiebreak: prefer similar length)
  let best=null,bestScore=-1;
  for(const{k,v}of bList){
    const kn=_norm(k);const minLen=Math.min(kn.length,n.length);
    let ml=0;for(let i=0;i<minLen;i++){if(kn[i]===n[i])ml++;else break;}
    if(ml>=3){const sc=ml-Math.abs(kn.length-n.length)*0.4;if(sc>bestScore){best=v;bestScore=sc;}}
  }
  return best;
}

})();

function buildTimeline(){
  const gc=document.getElementById('gantt-container');
  if(gc._built)return;

  // ── date helpers ────────────────────────────────────────────────────────────
  const REF=new Date('2025-12-01T00:00:00');
  const DISP=new Date('2026-08-01T00:00:00');
  const totalMs=DISP-REF;
  const pct=ds=>((new Date(ds+'T00:00:00')-REF)/totalMs*100);
  const barSpan=(s,e)=>{
    const ongoing=e>='2026-12-31';
    const effE=ongoing?'2026-08-01':e;
    const l=Math.max(0,pct(s));
    const r=Math.min(100,pct(effE));
    return{l,w:Math.max(.3,r-l),ongoing};

  const fd=ds=>{const[y,m,d]=ds.split('-');return(y==='2025'?'25/':'')+parseInt(m)+'/'+parseInt(d);};
  const fRange=(s,e,ongoing)=>ongoing?fd(s)+'起':fd(s)+'–'+fd(e);

  const MONTH_DEFS=[
    {d:'2025-12-01',yr:'2025',mo:'12月'},
    {d:'2026-01-01',yr:'',mo:'1月'},
    {d:'2026-02-01',yr:'',mo:'2月'},
    {d:'2026-03-01',yr:'',mo:'3月'},
    {d:'2026-04-01',yr:'',mo:'4月'},

    '產品':{pill:'#059669',hdr:'linear-gradient(135deg,#f0fdf4,#dcfce7)',border:'#6ee7b7',nameBg:'#f0fdf4'},
  };

  const today=new Date();

    ?'<div class="gantt-today" style="left:'+todayPct.toFixed(2)+'%"><div class="gantt-today-lbl">今</div></div>':'';

  ).join('');

    return'<div class="gantt-month-tick" style="left:'+l+'%;transform:translateX(-50%);text-align:center">'
      +(m.yr?'<span class="yr">'+m.yr+'</span>':'')
      +'<span class="mo">'+m.mo+'</span></div>';
  }).join('');

  // ── legend ───────────────────────────────────────────────────────────────────

    {c:'#ec4899',label:'原綺活動'},{c:'#3b82f6',label:'原渥活動'},{c:'#10b981',label:'產品活動'},
    {c:'#94a3b8',label:'制度/價目（持續中）'},
    ...(showToday?[{line:true,label:'今天'}]:[]),

  const legendHtml=legendItems.map(l=>l.line
    ?'<div class="gantt-legend-item"><div style="width:2px;height:14px;background:#ef4444;border-radius:1px"></div><span>'+l.label+'</span></div>'
    :'<div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:'+l.c+'"></div><span>'+l.label+'</span></div>'
  ).join('');

  let rowsHtml='';

    if(idx===0||TIMELINE[idx-1].b!==act.b){
      rowsHtml+=
        '<div class="gantt-brand-hdr" data-brand="'+act.b+'" style="background:'+cfg.hdr+';border-color:'+cfg.border+'">'
        +'<div class="gantt-brand-hdr-name" style="background:'+cfg.nameBg+'">'
        +'<span class="gantt-brand-pill" style="background:'+cfg.pill+'">'+act.b+'</span></div>'
        +'<div class="gantt-brand-hdr-bar" style="position:relative;height:34px">'+vlines+'</div>'
        +'</div>';
    }

    // Bar inner content — name + date when wide, date only when medium, arrow when narrow
    let barInner='';
    if(w>16){
      barInner='<span class="gantt-bar-name">'+act.a+'</span>'
        +'<span class="gantt-bar-date">'+dateStr+'</span>';
    } else if(w>5){
      barInner='<span class="gantt-bar-date">'+dateStr+'</span>';
    }
    if(ongoing) barInner+='<span class="gantt-ongoing-arrow">→</span>';

    // Jump-to-stats button (only for activities with a stats link, and no subs)
    const jumpBtn=act.gid&&!(act.subs&&act.subs.length)
      ?'<button class="gantt-jump-btn" onclick="event.stopPropagation();_gjump(\''+act.gid+'\',\''+act.a+'\','+(act.actKey?'\''+act.actKey+'\'':'null')+')">查看成效</button>':'';

    // Sub-plan list HTML (for parent entries)
    let subsHtml='';
    if(act.subs&&act.subs.length){
      subsHtml='<div class="gantt-sub-list">';
      act.subs.forEach(function(sub){
        const subJumpBtn=sub.gid
          ?'<button class="gantt-jump-btn" onclick="event.stopPropagation();_gjump(\''+sub.gid+'\',\''+sub.a+'\','+(sub.actKey?'\''+sub.actKey+'\'':'null')+')">查看成效</button>':'';
        subsHtml+='<div class="gantt-sub-row">'
          +'<span class="gantt-sub-name">'+sub.a+'</span>'
          +subJumpBtn
          +(sub.d?'<span class="gantt-sub-desc">'+sub.d+'</span>':'')
          +'</div>';
      });
      subsHtml+='</div>';
    }

    // Activity row
    const hasSubs=!!(act.subs&&act.subs.length);
    rowsHtml+=
      '<div class="gantt-row" data-brand="'+act.b+'">'
      +'<div class="gantt-row-name" title="'+act.a+'" onclick="_gtoggle('+idx+')">'
      +'<span class="gantt-expand-icon" id="gchev-'+idx+'">'+(hasSubs?'▸ 展開':'▸')+'</span>'
      +'<span class="gantt-name-text">'+act.a+'</span>'
      +jumpBtn
      +'</div>'
      +'<div class="gantt-row-bar" style="cursor:default">'
      +vlinesFull
      +'<div class="gantt-bar'+(ongoing?' ongoing':'')+'" style="left:'+lf+'%;width:'+wf+'%;background:'+act.c+'">'+barInner+'</div>'
      +'</div>'
      +'</div>'
      +'<div class="gantt-detail-row" data-brand="'+act.b+'" id="gdet-'+idx+'" style="display:none">'
      +(act.d?'<div class="gantt-detail-desc">📋 '+act.d+'</div>':'')
      +subsHtml
      +'</div>';
  });

  gc.innerHTML=
    '<div class="gantt-title">📅 全品牌活動走期</div>'
    +'<div class="gantt-subtitle" id="gantt-subtitle-lbl">資料來源：Google Sheets（每日自動更新）　點擊活動名稱展開細項，點擊時間軸跳轉至成效數據</div>'
    +'<div class="gantt-brand-filter">'
    +'<span class="gantt-brand-filter-label">篩選：</span>'
    +'<button class="gbf-btn active" data-brand="all" onclick="_filterTimeline(\'all\')">全部活動</button>'
    +'<button class="gbf-btn" data-brand="原綺" onclick="_filterTimeline(\'原綺\')">原綺</button>'
    +'<button class="gbf-btn" data-brand="原渥" onclick="_filterTimeline(\'原渥\')">原渥</button>'
    +'<button class="gbf-btn" data-brand="產品" onclick="_filterTimeline(\'產品\')">產品</button>'
    +'</div>'
    +'<div class="gantt-legend">'+legendHtml+'</div>'
    +'<div class="gantt-outer"><div class="gantt-inner">'
    +'<div class="gantt-head">'
    +'<div class="gantt-name-hdr">活動名稱</div>'
    +'<div class="gantt-timeline-hdr">'+monthTicksHtml+vlines+'</div>'
    +'</div>'
    +rowsHtml
    +'</div></div>';
  gc._built=true;

  // ── expose helpers globally after DOM is built ───────────────────────────────
  window._filterTimeline=function(brand){
    document.querySelectorAll('.gbf-btn').forEach(b=>b.classList.toggle('active',b.dataset.brand===brand));
    document.querySelectorAll('.gantt-brand-hdr,.gantt-row,.gantt-detail-row').forEach(function(el){
      if(brand==='all'){el.style.display='';}
      else{el.style.display=(el.dataset.brand===brand)?'':'none';}
    });
  };
  window._gtoggle=function(idx){
    const det=document.getElementById('gdet-'+idx);
    const chev=document.getElementById('gchev-'+idx);
    if(!det)return;
    const open=det.style.display!=='none';
    det.style.display=open?'none':'';
    if(chev){
      const hasSubs=chev.textContent.indexOf('展開')>=0||chev.textContent.indexOf('收合')>=0;
      if(hasSubs)chev.textContent=open?'▸ 展開':'▾ 收合';
      else chev.textContent=open?'▸':'▾';
    }
  };
  window._gjump=function(gid,actName,actKey){
    const bb=document.getElementById('timeline-back');
    const hint=document.getElementById('back-hint-text');
    if(bb)bb.classList.add('show');
    if(hint&&actName)hint.textContent='來自「'+actName+'」';
    switchTab('stats');
    if(!gid)return;
    setTimeout(function(){
      // Find target element; if missing, widen store filter to 全集團 and rebuild
      let gb=document.getElementById(gid);
      if(!gb){
        setStore('全集團');  // setStore() synchronously calls build()
        gb=document.getElementById(gid);
        if(!gb)return;
      }
      // Expand parent brand section if collapsed
      const brandBody=gb.closest('[id$="-body"]');
      if(brandBody&&brandBody.style.display==='none'){
        brandBody.style.display='';
        const bId=brandBody.id.replace('brand-','').replace('-body','');
        const bChev=document.getElementById('bd-chev-'+bId);
        if(bChev)bChev.classList.add('open');
      }
      if(!gb.classList.contains('open'))gb.classList.add('open');
      const chev=document.getElementById('cg-'+gid.replace('gb-',''));
      if(chev&&!chev.classList.contains('open'))chev.classList.add('open');
      // Scroll to specific activity section if actKey provided
      let target=gb;
      if(actKey){
        const secs=gb.querySelectorAll('.act-section');
        for(const s of secs){
          const nm=s.querySelector('.aname');
          if(nm&&nm.textContent.indexOf(actKey)>=0){target=s;break;}
        }
      }
      target.scrollIntoView({behavior:'smooth',block:'center'});
      target.style.transition='box-shadow .2s';
      target.style.boxShadow='0 0 0 3px #3b82f655';
      setTimeout(function(){target.style.boxShadow='';},1800);
    },300);
  };
}
</script>
<footer style="text-align:center;padding:18px 0 22px;font-size:11px;color:#b0b8c1;background:#f5f7fa;border-top:1px solid #e8edf2;letter-spacing:1.5px;font-weight:500">Created by MAO</footer>
