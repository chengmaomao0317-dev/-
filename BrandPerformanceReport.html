<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA LUEUR 原渥集團 業績統計儀表板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC',sans-serif;background:#f5f4f0;color:#1a1a18;font-size:13px;line-height:1.5}
/* ── Header ── */
.site-header{background:#000;border-bottom:1px solid #1a1a1a;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.5)}
.header-inner{display:flex;align-items:center;gap:18px;padding:14px 32px;height:81px;max-width:1600px;margin:0 auto}
.logo-svg{flex-shrink:0}
.header-divider{width:1px;height:42px;background:#2a2a2a;flex-shrink:0}
.header-text{display:flex;flex-direction:column;gap:3px}
.header-title{font-size:16px;font-weight:700;color:#e5e7eb;letter-spacing:.3px}
.header-sub{font-size:11px;color:#4b5563}
/* ── Nav bar ── */
.nav-bar{background:#000;border-bottom:1px solid #222;position:sticky;top:81px;z-index:99}
.nav-inner{display:flex;align-items:center;padding:0 32px;height:44px;gap:6px;max-width:1600px;margin:0 auto}
.nav-item{font-size:12px;padding:4px 12px;border-radius:6px;border:none;cursor:pointer;font-weight:500;background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);transition:background .15s;white-space:nowrap}
.nav-item:hover:not(.active){background:rgba(255,255,255,.13)}
.nav-item.active{background:#fff;color:#111}
.nav-filter{margin-left:auto;display:flex;align-items:center;gap:8px;border-left:1px solid rgba(255,255,255,.1);padding-left:14px}
.filter-label{font-size:12px;color:rgba(255,255,255,.4);margin-right:2px}
.nav-filter select{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:0.5px solid rgba(255,255,255,.15);border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer}
.nav-filter select option{background:#111}
/* ── Layout ── */
.page{max-width:1600px;margin:0 auto;padding:16px 32px}
.tab-content{display:none}
.tab-content.active{display:block}
/* ── Top KPI ── */
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi-card{background:#fff;border:0.5px solid rgba(0,0,0,.08);border-radius:10px;padding:12px 16px}
.kpi-label{font-size:10px;color:#888780;margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:700;color:#1a1a18;letter-spacing:-.5px}
.kpi-sub{font-size:10px;margin-top:3px}
.up{color:#2a7a4a}.down{color:#c0392b}.flat{color:#888780}
/* ── Brand Group ── */
.brand-group{margin-bottom:14px}
.brand-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:8px}
.brand-bar.ki{background:#edf2ff}
.brand-bar.wo{background:#fff1f1}
.brand-name{font-size:12px;font-weight:700;letter-spacing:.5px}
.brand-sum{font-size:10px;color:#888780}
.brand-warn{margin-left:auto;font-size:10px;font-weight:600;color:#c0392b}
.brand-src{margin-left:auto;display:flex;gap:10px;align-items:center}
.src-item{display:flex;align-items:center;gap:4px;font-size:9px;color:#555}
.src-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* ── Store Cards ── */
.stores-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stores-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.sc{background:#fff;border:0.5px solid rgba(0,0,0,.09);border-radius:10px;padding:12px 13px}
.sc-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid rgba(0,0,0,.06)}
.sc-name{font-size:13px;font-weight:700;color:#1a1a18}
.sc-sub{font-size:9px;color:#888780;margin-top:1px}
.sc-badge{font-size:9px;padding:2px 7px;border-radius:12px;font-weight:600;margin-left:auto}
.badge-g{background:#d4edda;color:#1a6b3c}
.badge-y{background:#fff3cd;color:#856404}
.badge-r{background:#fce4e4;color:#c0392b}
/* ── Metrics table in card ── */
.mt{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:9px}
.mt th{color:#888780;font-weight:500;padding:3px 4px;text-align:right;border-bottom:0.5px solid rgba(0,0,0,.07);white-space:nowrap}
.mt th:first-child{text-align:left;font-size:9px}
.mt td{padding:3px 4px;text-align:right;border-bottom:0.5px solid rgba(0,0,0,.04);color:#1a1a18}
.mt td:first-child{text-align:left;font-weight:600;color:#444;font-size:9px}
.mt .total-row td{font-weight:700;background:#fafaf8;border-top:0.5px solid rgba(0,0,0,.08);border-bottom:none}
.mt .section-row td{background:#f5f3ee;font-size:8.5px;color:#888780;padding:2px 4px}
/* ── Revenue mix bar ── */
.mix-wrap{margin-bottom:9px}
.mix-label{display:flex;justify-content:space-between;margin-bottom:3px}
.mix-label span{font-size:9px;color:#888780}
.mix-bar{height:6px;border-radius:3px;overflow:hidden;display:flex;background:#f0ede8}
/* ── Progress bar ── */
.prog-wrap{margin-bottom:9px}
.prog-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.prog-label span{font-size:9px;color:#888780}
.prog-label strong{font-size:11px;font-weight:700}
.prog-bar{height:8px;background:#ede9e3;border-radius:4px;overflow:hidden;position:relative}
.prog-fill{height:100%;border-radius:4px;transition:width .4s}
/* ── Monthly bars ── */
.month-sec{margin-bottom:0}
.month-sec-label{font-size:9px;font-weight:600;color:#444;margin-bottom:4px}
.month-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px}
.mc{text-align:center}
.mc-wrap{height:32px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:2px}
.mc-bar{width:13px;border-radius:2px 2px 0 0}
.mc-pct{font-size:7.5px;font-weight:700}
.mc-lbl{font-size:7.5px;color:#888780}
/* ── Divider ── */
.divider{height:0.5px;background:rgba(0,0,0,.07);margin:8px 0}
/* ── 業績總表 ── */
.tbl-section{margin-bottom:14px}
.tbl-brand-bar{display:flex;align-items:center;gap:8px;padding:7px 11px;border-radius:7px;margin-bottom:8px}
.store-tables{display:grid;gap:10px}
.store-tbl-card{background:#fff;border:0.5px solid rgba(0,0,0,.09);border-radius:12px;overflow:hidden}
.store-tbl-title{font-size:11px;font-weight:700;color:#1a1a18;margin-bottom:8px;display:flex;align-items:center;gap:7px}
/* store header */
.store-hd{padding:14px 16px;border-bottom:0.5px solid rgba(0,0,0,.07)}
.store-hd-name{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.store-name-big{font-size:21px;font-weight:500}
.store-summary-top{display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:start}
.store-summary-left{}
.store-rev-big{font-size:22px;font-weight:500;letter-spacing:-.02em;margin:4px 0 2px}
.store-summary-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
.store-met{background:#f5f3ee;border-radius:7px;padding:8px 4px;text-align:center}
.store-met-v{font-size:13px;font-weight:500}
.store-met-l{font-size:9px;color:#aaa;margin-top:1px}
/* table */
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.perf-tbl{width:100%;border-collapse:collapse;font-size:10px}
.perf-tbl th{color:#888780;font-weight:500;padding:5px 8px;text-align:right;border-bottom:0.5px solid rgba(0,0,0,.08);white-space:nowrap;background:#fafaf8}
.perf-tbl th:first-child{text-align:left;position:sticky;left:0;z-index:2;background:#fafaf8}
.perf-tbl td{padding:5px 8px;text-align:right;color:#1a1a18;border-bottom:0.5px solid rgba(0,0,0,.04)}
.perf-tbl td:first-child{text-align:left;color:#444;position:sticky;left:0;background:#fff;z-index:1}
.perf-tbl tr:last-child td{font-weight:700;border-bottom:none;border-top:0.5px solid rgba(0,0,0,.09);background:#f7f5f1}
.perf-tbl tr:last-child td:first-child{background:#f7f5f1}
.perf-tbl .subtotal td{font-weight:600;color:#888;font-size:9px}
/* source panel */
.store-src-panel{padding:12px 16px 14px}
.store-src-inner{background:#f7f5f1;border-radius:10px;padding:12px 14px}
.store-src-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
/* expandable month rows */
.tab3-nav{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px;position:sticky;top:125px;z-index:50;background:#f5f4f0;padding:8px 0;margin-top:-8px}
.tab3-pg{display:flex;gap:4px;align-items:center;border-radius:10px;padding:5px 8px;border:0.5px solid}
.tab3-pg.ki{background:rgba(192,64,112,.07);border-color:rgba(192,64,112,.2)}
.tab3-pg.wo{background:rgba(45,90,158,.07);border-color:rgba(45,90,158,.2)}
.tab3-psep{width:0.5px;height:14px;flex-shrink:0}
.tab3-pg.ki .tab3-psep{background:rgba(192,64,112,.2)}
.tab3-pg.wo .tab3-psep{background:rgba(45,90,158,.2)}
.tab3-pill{border:none;background:transparent;font-size:12px;font-weight:400;cursor:pointer;border-radius:6px;padding:4px 9px;display:inline-flex;align-items:center;gap:4px;transition:background .12s;white-space:nowrap}
.tab3-pill.ki{color:#c04070}.tab3-pill.wo{color:#2d5a9e}
.tab3-pill.ki.act{background:rgba(192,64,112,.15);font-weight:500}
.tab3-pill.wo.act{background:rgba(45,90,158,.15);font-weight:500}
.tab3-pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tab3-pill.ki .tab3-pdot{background:#c04070}.tab3-pill.wo .tab3-pdot{background:#2d5a9e}
.toggle-btn{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:3px;border:.5px solid rgba(0,0,0,.15);cursor:pointer;font-size:9px;color:#888;margin-right:4px;vertical-align:middle;background:#f0ede8;user-select:none;flex-shrink:0}
.toggle-btn.open{background:#e0dcd5;color:#333}
.exp-row>td{padding:0 !important;border-bottom:.5px solid rgba(0,0,0,.08)}
.exp-inner{background:#f9f8f6;padding:10px 14px 12px 36px;border-top:.5px solid rgba(0,0,0,.05)}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px}
.exp-sec-label{font-size:10px;font-weight:500;color:#555;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.exp-src-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:.5px solid rgba(0,0,0,.05);font-size:10px;color:#666}
.exp-src-row:last-child{border-bottom:none}
.exp-src-name{display:flex;align-items:center;gap:5px}
.exp-src-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
@media(max-width:600px){.exp-inner{padding-left:14px}.exp-grid{grid-template-columns:1fr}}
/* responsive */
@media(max-width:600px){
  .store-summary-top{display:block}
  .store-summary-left{margin-bottom:12px}
  .store-summary-metrics{grid-template-columns:repeat(2,1fr)}
  .store-src-grid{grid-template-columns:1fr 1fr}
}
/* ── Brand badge pill ── */
.brand-pill{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.3px}
.bp-ki{background:#fde8f0;color:#c04070}
.bp-wo{background:#e8effe;color:#2d5a9e}
.bp-ec{background:#e8f5e9;color:#2e7d32}
/* ── Section separator ── */
.sec-sep{margin:16px 0 12px;border-top:0.5px dashed rgba(0,0,0,.12);padding-top:14px}
.sec-title{font-size:13px;font-weight:700;color:#1a1a18;margin-bottom:10px}
/* ── Source donut in store card ── */
.src-mini{margin-top:6px}
.src-bar-full{height:6px;border-radius:3px;overflow:hidden;display:flex;margin-bottom:3px}
.src-legend{display:flex;gap:7px;flex-wrap:wrap}
/* ── YOY badge ── */
.yoy{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600}
.yoy-up{background:#e8f5e9;color:#2a7a4a}
.yoy-dn{background:#fce4e4;color:#c0392b}
.yoy-fl{background:#f5f3ee;color:#888780}
/* ── Year table ── */
.ytbl-wrap{overflow-x:auto;border-radius:10px;border:0.5px solid rgba(0,0,0,.09);margin-bottom:20px}
.ytbl{width:100%;border-collapse:collapse;font-size:10.5px;white-space:nowrap}
.ytbl thead tr:first-child th{background:#111;color:#bbb;font-weight:500;font-size:10px;padding:7px 8px;text-align:center;border-right:0.5px solid rgba(255,255,255,.08)}
.ytbl thead tr:first-child th:first-child{text-align:left;min-width:64px}
.ytbl thead tr:last-child th{background:#1e1e1e;color:#888;font-weight:400;font-size:9px;padding:5px 8px;text-align:right;border-right:0.5px solid rgba(255,255,255,.05);border-bottom:0.5px solid rgba(255,255,255,.1)}
.ytbl thead tr:last-child th:first-child{text-align:left}
.ytbl tbody td{padding:5px 8px;border-bottom:0.5px solid rgba(0,0,0,.05);text-align:right;color:#1a1a18;vertical-align:middle}
.ytbl tbody td:first-child{text-align:left;font-weight:600;font-size:10px;position:sticky;left:0;background:#fff;z-index:2;border-right:0.5px solid rgba(0,0,0,.08)}
.ytbl .brow td{background:#f5f3ee;font-size:9px;color:#888780;padding:3px 8px;font-weight:600;letter-spacing:.3px}
.ytbl .brow td:first-child{background:#f5f3ee}
.ytbl tfoot td{font-weight:700;background:#f5f3ee;border-top:0.5px solid rgba(0,0,0,.1);border-bottom:none;font-size:10.5px}
.ytbl tfoot td:first-child{background:#f5f3ee}
.ytbl .yr-sep{border-left:0.5px solid rgba(0,0,0,.08)}
.ach{display:inline-block;font-size:8.5px;font-weight:600;padding:1px 5px;border-radius:3px}
.ach-g{background:#EAF3DE;color:#3B6D11}.ach-b{background:#E6F1FB;color:#185FA5}
.ach-o{background:#FAEEDA;color:#854F0B}.ach-r{background:#FCEBEB;color:#A32D2D}
.txt-up{color:#2a7a4a}.txt-dn{color:#c0392b}.txt-na{color:#aaa}
/* ── Trend cards ── */
.trend-sep{margin:20px 0 12px;padding-top:16px;border-top:0.5px dashed rgba(0,0,0,.1);font-size:11px;font-weight:600;color:#444;letter-spacing:.04em}
.trend-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.tcard{background:#fff;border:0.5px solid rgba(0,0,0,.09);border-radius:10px;padding:12px 14px}
.tc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.tc-name{font-size:11px;font-weight:700;color:#1a1a18}
.tc-rev{font-size:17px;font-weight:700;color:#1a1a18;line-height:1;margin-bottom:2px}
.tc-yoy{font-size:10px;margin-bottom:8px}
.chart-wrap{position:relative;height:68px}
.yr-axis{display:flex;justify-content:space-between;margin-top:2px}
.yr-axis span{font-size:8px;color:#888780}

/* ══ 每月業績狀況進度 Tab ══ */
.mo-tabs-wrap{display:flex;gap:4px;margin-bottom:14px;background:#f0ede8;padding:4px;border-radius:10px;width:fit-content;position:sticky;top:125px;z-index:50}
.mo-tab-btn{padding:5px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:#888;background:none;border:none;transition:background .12s}
.mo-tab-btn:hover:not(.dim){background:rgba(0,0,0,.05)}
.mo-tab-btn.active{background:#fff;color:#1a1a18;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.mo-tab-btn.dim{color:#ccc;cursor:default}
.mo-brand-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.mo-bc{border-radius:12px;border:.5px solid var(--border,rgba(0,0,0,.1));background:#fff;overflow:hidden}
.mo-bc.ki{background:rgba(192,64,112,.08);border-color:rgba(192,64,112,.2)}
.mo-bc.wo{background:rgba(45,90,158,.08);border-color:rgba(45,90,158,.2)}
.mo-bc.ki .mo-bc-bar-wrap{background:rgba(192,64,112,.12)}
.mo-bc.wo .mo-bc-bar-wrap{background:rgba(45,90,158,.12)}
.mo-bc.ki .mo-bc-2cell{border-color:rgba(192,64,112,.15)}
.mo-bc.wo .mo-bc-2cell{border-color:rgba(45,90,158,.15)}
.mo-bc-top{display:flex;align-items:center;justify-content:space-between;padding:12px 15px 8px}
.mo-bc-brand{display:flex;align-items:center;gap:7px}
.mo-bc-dot{width:8px;height:8px;border-radius:50%}
.mo-bc-dot.ki{background:#c04070}.mo-bc-dot.wo{background:#2d5a9e}
.mo-bc-name{font-size:13px;font-weight:500;color:#1a1a18}
.mo-bc-chip{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}
.mo-bc-chip.r{background:rgba(192,57,43,.1);color:#c0392b}
.mo-bc-chip.g{background:rgba(26,107,60,.1);color:#1a6b3c}
.mo-bc-body{display:flex;align-items:flex-end;justify-content:space-between;padding:0 15px 11px;gap:12px}
.mo-bc-rev{font-size:22px;font-weight:500;color:#1a1a18;letter-spacing:-.02em}
.mo-bc-tgt{font-size:10px;color:#888780;margin-top:3px}
.mo-bc-stats{display:flex;gap:16px}
.mo-bc-stat{text-align:right}
.mo-bc-stat-label{font-size:9px;color:#888780}
.mo-bc-stat-val{font-size:13px;font-weight:500;color:#1a1a18;margin-top:2px}
.mo-bc-bar-wrap{height:3px;background:rgba(0,0,0,.07)}
.mo-bc-bar{height:100%}
.mo-bc-2grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.mo-bc-2cell{padding:8px 13px;border-right:.5px solid rgba(0,0,0,.07);border-top:.5px solid rgba(0,0,0,.07)}
.mo-bc-2cell:nth-child(2n){border-right:none}
.mo-bc-2cell-v{font-size:13px;font-weight:500;color:#1a1a18}
.mo-bc-2cell-l{font-size:9.5px;color:#888780;margin-top:1px}
.mo-group-card{background:#fff;border:.5px solid rgba(0,0,0,.09);border-radius:14px;padding:18px 20px;margin-bottom:12px}
.mo-group-label{font-size:10px;color:#aaa;font-weight:600;letter-spacing:.07em;margin-bottom:8px}
.mo-group-row{display:flex;align-items:baseline;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.mo-group-rev{font-size:34px;font-weight:500;color:#1a1a18;letter-spacing:-.03em;line-height:1}
.mo-group-ach{font-size:22px;font-weight:500}
.mo-group-meta{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mo-group-tgt{font-size:11px;color:#aaa}
.mo-group-gap{font-size:10px;background:rgba(200,50,50,.08);color:#c03030;padding:2px 8px;border-radius:8px}
.mo-group-bar{height:3px;background:rgba(0,0,0,.07);border-radius:2px;overflow:hidden}
/* ── Daily progress ── */
.mo-day-prog{border-top:.5px solid rgba(0,0,0,.07);margin-top:8px}
/* store card: inset strip edge-to-edge */
.mo-sc .mo-day-prog{background:rgba(0,0,0,.022);margin:8px -13px 9px;padding:9px 13px 11px;border-top:.5px solid rgba(0,0,0,.07);border-bottom:.5px solid rgba(0,0,0,.07)}
/* brand card: inset with brand-tinted bg */
.mo-bc.ki .mo-day-prog{background:rgba(192,64,112,.06);padding:10px 15px 14px}
.mo-bc.wo .mo-day-prog{background:rgba(45,90,158,.06);padding:10px 15px 14px}
/* group card: inset spanning full card */
.mo-group-card .mo-day-prog{background:rgba(0,0,0,.022);margin:8px -20px -18px;padding:10px 20px 15px;border-top:.5px solid rgba(0,0,0,.07)}
.mo-day-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.mo-day-label{font-size:10px;color:#aaa}
.mo-day-badge{font-size:10px;font-weight:600;padding:1px 8px;border-radius:10px}
.mo-day-badge.behind{background:rgba(180,30,30,.1);color:#c0392b}
.mo-day-badge.ahead{background:rgba(26,107,60,.1);color:#1a6b3c}
.mo-day-nums{display:flex;align-items:baseline;gap:4px;margin-bottom:7px}
.mo-group-card .mo-day-cur{font-size:19px}
.mo-bc .mo-day-cur{font-size:15px}
.mo-sc .mo-day-cur{font-size:14px}
.mo-day-cur{font-weight:500;color:#1a1a18}
.mo-day-sep{font-size:12px;color:#ccc}
.mo-day-exp{font-size:12px;color:#888780}

  ki_taipei:100000000, ki_taichung:44700000,
};

// Cross-brand shared annual targets (starting 2025)
const PAIRED_STORES = {
  wo_dongmen:  {isFirst:true,  partner:'ki_taipei',   borderColor:'#8B7355', bg:'#EDE8DF', badge:'①', sharedTgt:{2025:85000000,  2026:100000000}},
  ki_taipei:   {isFirst:false, partner:'wo_dongmen',  borderColor:'#8B7355', bg:'#EDE8DF', badge:'①', sharedTgt:{2025:85000000,  2026:100000000}},
  wo_taichung: {isFirst:true,  partner:'ki_taichung', borderColor:'#C4B49A', bg:'#F5F1EA', badge:'②', sharedTgt:{2025:47000000,  2026:55000000}},
  ki_taichung: {isFirst:false, partner:'wo_taichung', borderColor:'#C4B49A', bg:'#F5F1EA', badge:'②', sharedTgt:{2025:47000000,  2026:55000000}},
};

// Brand totals — recalculated after each data load
let KI_TOTAL_REV=0, WO_TOTAL_REV=0, KI_TARGET_H1=0, WO_TARGET_H1=0, TOTAL_REV=0, TOTAL_TARGET=0;
let KI_TARGET_YR=0, WO_TARGET_YR=0, TOTAL_TARGET_YR=0;
function recalcTotals(){
  KI_TOTAL_REV = KI_STORES.reduce((s,k)=>s+DATA[k].revenue,0);
  WO_TOTAL_REV = WO_STORES.reduce((s,k)=>s+DATA[k].revenue,0);
  KI_TARGET_H1 = KI_STORES.reduce((s,k)=>s+DATA[k].target_h1,0);
  WO_TARGET_H1 = WO_STORES.reduce((s,k)=>s+DATA[k].target_h1,0);
  TOTAL_REV    = KI_TOTAL_REV + WO_TOTAL_REV;
  TOTAL_TARGET = KI_TARGET_H1 + WO_TARGET_H1;
  // Full-year annual targets — paired stores counted once via isFirst
  const _allKeys=[...KI_STORES,...WO_STORES];
  TOTAL_TARGET_YR = _allKeys.reduce((s,k)=>{
    const pair=PAIRED_STORES[k];
    if(pair && !pair.isFirst) return s;           // skip: shared target already added by partner
    if(pair)  return s+(pair.sharedTgt[2026]||0); // count shared target once
    return s+(TARGET_2026[k]||0);                 // individual annual target
  },0);
  // Brand-level annual targets (fixed per management plan)
  KI_TARGET_YR = 118600000;
  WO_TARGET_YR = 103900000;
  TOTAL_TARGET_YR = 222500000;
}

function fmtM(n){return n?'$'+Math.round(n).toLocaleString():'$0'}
function fmtK(n){return n>=1000?'$'+(n/1000).toFixed(0)+'K':'$'+Math.round(n)}
function fmtFull(n){return n?'$'+Math.round(n).toLocaleString():null}
function fmtN(n){return n.toLocaleString()}
function fmtPct(p){return Math.round(p*100)+'%'}
function pctColor(p){return p>=1?'#2a7a4a':p>=0.8?'#5b8dee':p>=0.7?'#f0a030':'#e27575'}
function pctTextColor(p){return p>=1?'#2a7a4a':'#c0392b'}
function achieveBadge(p){
  if(p>=1) return ['badge-g','達標'];
  return ['badge-r','落後'];
}
function monthBarColor(p){
  if(p===null) return '#ddd';
  if(p>=1) return '#2a7a4a';
  if(p>=0.8) return '#5b8dee';
  if(p>=0.7) return '#f0a030';
  return '#e27575';
}
function yoyBadge(y){
  if(y===null) return '<span class="yoy yoy-fl">新開店</span>';
  const cls = y>0?'yoy-up':y<0?'yoy-dn':'yoy-fl';
  return `<span class="yoy ${cls}">${Math.round(y*100)}% YOY</span>`;
}

function renderStoreCard(s){

  const pct_bar = Math.min(s.achieve_h1,1)*100;
  const bar_color = pctColor(s.achieve_h1);
  const new_pct = s.revenue>0?(s.new_rev/s.revenue*100).toFixed(0):0;
  const old_pct = 100-new_pct;
  const gap = s.target_h1-s.revenue;
  const total_count = s.new_count + s.old_count;

  // Monthly bars
  const monthBars = s.months.map(m=>{
    const h = m.achieve===null ? 0 : Math.min(m.achieve,1.5)/1.5*100;
    const color = monthBarColor(m.achieve);
    const pctText = m.achieve===null ? (m.rev>0?'—':'—') : fmtPct(m.achieve);

    return `<div class="mc">
      <div class="mc-wrap"><div class="mc-bar" style="height:${h}%;background:${color}"></div></div>
      <div class="mc-pct" style="color:${pctColor2}">${pctText}</div>

    <div class="sc-head">
      <div>
        <div class="sc-name">${s.label}</div>
        <div class="sc-sub">H1目標 ${fmtM(s.target_h1)}</div>
      </div>
      <span class="sc-badge ${badgeClass}">${badgeText} ${fmtPct(s.achieve_h1)}</span>
    </div>

    <table class="mt">
      <tr><th></th><th>業績</th><th>人數</th><th>客單</th></tr>
      <tr class="section-row"><td colspan="4">新客</td></tr>
      <tr>
        <td>新客</td>
        <td>${fmtM(s.new_rev)}</td>
        <td>${fmtN(s.new_count)}</td>
        <td>${fmtK(s.new_avg)}</td>
      </tr>
      <tr class="section-row"><td colspan="4">舊客</td></tr>
      <tr>
        <td>舊客</td>
        <td>${fmtM(s.old_rev)}</td>
        <td>${fmtN(s.old_count)}</td>
        <td>${fmtK(s.old_avg)}</td>
      </tr>
      <tr class="total-row">
        <td>合計</td>
        <td>${fmtM(s.revenue)}</td>
        <td>${fmtN(total_count)}</td>
        <td>${fmtK(s.revenue>0?s.revenue/total_count:0)}</td>

    <div class="mix-wrap">

        <span>新客 ${new_pct}% 佔比</span>
        <span>舊客 ${old_pct}%</span>

        <div style="width:${old_pct}%;background:#e8c86e"></div>
      </div>

    <div class="prog-wrap">
      <div class="prog-label">
        <span>H1 累計進度</span>
        <strong style="color:${bar_color}">${fmtPct(s.achieve_h1)}　${gap>0?'差 '+fmtM(gap):'超標'}</strong>
      </div>
      <div class="prog-bar">

}

function renderSrcBar(brandKey){
  const src = BRAND_SOURCES[brandKey];
  const total = Object.values(src).reduce((a,b)=>a+b,0);
  const colors = {行銷:'#5b8dee',業務:'#e27575',團購:'#f0a030',其他:'#5bbf8a'};
  const bars = Object.entries(src).map(([k,v])=>
    `<div style="width:${(v/total*100).toFixed(1)}%;background:${colors[k]}"></div>`
  ).join('');
  const legend = Object.entries(src).map(([k,v])=>
    `<div class="src-item"><div class="src-dot" style="background:${colors[k]}"></div>${k} ${(v/total*100).toFixed(0)}%（${v}人）</div>`
  ).join('');
  return `<div class="src-mini">
    <div class="src-bar-full">${bars}</div>
    <div class="src-legend">${legend}</div>
  </div>`;
}

//  YEAR TABLE HELPERS
// ══════════════════════════════════════════
function achChip(r,t){
  if(!t||!r) return '—';
  const p=r/t;
  const cls=p>=1?'ach-g':'ach-r';
  return `<span class="ach ${cls}">${Math.round(p*100)}%</span>`;
}
function yoyTxt(cur,prev){
  if(!prev||!cur) return '<span class="txt-na">—</span>';
  const d=(cur-prev)/prev;
  const cls=d>0?'txt-up':d<0?'txt-dn':'txt-na';
  return `<span class="${cls}">${Math.round(d*100)}%</span>`;
}
function revCell(v){ return v?fmtFull(v):'<span style="color:#ccc">—</span>'; }
function tgtCell(v){ return v?`<span style="color:#aaa">${fmtFull(v)}</span>`:'<span style="color:#ddd">—</span>'; }

// ══════════════════════════════════════════
//  RENDER TAB 1: 年度達成
// ══════════════════════════════════════════
let _trendCharts=[];
function renderTab1(){
  // destroy old charts
  _trendCharts.forEach(c=>{try{c.destroy()}catch(e){}});
  _trendCharts=[];

  // Flat order — paired stores adjacent for rowspan to work

  // Build lookup: storeKey -> {yr -> {rev,target}}
  function histMap(key){
    const m={};

  }

            <th class="yr-sep" style="color:#7ab3ff">業績</th><th>年目標</th><th>達成</th><th>YOY</th>
          </tr>
        </thead>

        </tbody>
        <tfoot>${totalRow()}</tfoot>
      </table>
    </div>

    // add 2026 H1
    pts.push({yr:2026,rev:s.revenue/1e6,tgt:TARGET_2026[key]?TARGET_2026[key]/1e6:null});

    const labels=pts.map(p=>p.yr===2026?"'26H1":"'"+String(p.yr).slice(2));
    const revData=pts.map(p=>p.rev);
    const tgtData=pts.map(p=>p.tgt);
    const hasTgt=tgtData.some(v=>v!==null);

    const ctx=document.getElementById('tc'+idx);
    if(!ctx) return;
    const chart=new Chart(ctx,{
      type:'line',
      data:{
        labels,
        datasets:[
          {label:'業績',data:revData,borderColor:lineBlue,borderWidth:2,pointRadius:3,pointBackgroundColor:lineBlue,pointBorderWidth:0,fill:true,backgroundColor:lineFill,tension:0.3,spanGaps:false},
          ...(hasTgt?[{label:'目標',data:tgtData,borderColor:targetOrange,borderWidth:1.5,borderDash:[4,3],pointRadius:2,pointBackgroundColor:targetOrange,pointBorderWidth:0,fill:false,tension:0.3,spanGaps:true}]:[])
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'$'+Math.round(c.parsed.y*1e6).toLocaleString()}}},
        scales:{x:{display:false},y:{display:false,grace:'20%'}},
        animation:{duration:400}
      }
    });
    _trendCharts.push(chart);
  });
}

let MO_SNAP_DATA=[];   // index 0=1月, 1=2月, …
let _curMoTab=0;

function parseMoSheet(gd){
  const rows=gd.table.rows||[];
  const result={};
  let brand=null;
  for(let ri=0;ri<rows.length;ri++){
    const r=rows[ri];
    const c1=String(cv(r,1)||'').trim();
    const c3=String(cv(r,3)||'').trim();
    if(c1==='原綺'){brand='ki';continue;}
    if(c1==='原渥'){brand='wo';continue;}
    if(!brand) continue;
    if(c3!=='人數') continue;
    let key=null;
    if(c1==='台北') key='ki_taipei';
    else if(c1==='台中'&&brand==='ki') key='ki_taichung';
    else if(c1==='站前') key='wo_zhanqian';
    else if(c1==='大安') key='wo_daan';
    else if(c1==='忠孝') key='wo_zhongxiao';
    else if(c1==='東門') key='wo_dongmen';
    else if(c1==='台中'&&brand==='wo') key='wo_taichung';
    else if(c1==='板橋') key='wo_banqiao';
    if(!key) continue;
    const new_n=toN(cv(r,5)), old_n=toN(cv(r,6));
    const src_new={行銷:toN(cv(r,7)),業務:toN(cv(r,8)),團購:toN(cv(r,9)),其他:toN(cv(r,10))};
    const src_old={行銷:toN(cv(r,11)),業務:toN(cv(r,12)),團購:toN(cv(r,13)),其他:toN(cv(r,14))};
    const r2=rows[ri+1]||null;
    const target=r2?Math.abs(toN(cv(r2,2))):0;
    const total_rev=r2?toN(cv(r2,4)):0, new_rev=r2?toN(cv(r2,5)):0, old_rev=r2?toN(cv(r2,6)):0;
    const r3=rows[ri+2]||null;
    const achStr=r3?String(cv(r3,2)||'').replace('%',''):'';
    const achieve=achStr?parseFloat(achStr)/100:null;
    const new_avg=r3?Math.abs(toN(cv(r3,5))):0, old_avg=r3?Math.abs(toN(cv(r3,6))):0;
    result[key]={new_n,old_n,src_new,src_old,target,total_rev,new_rev,old_rev,achieve,new_avg,old_avg};
  }
  return result;
}

function renderH1Matrix(){
  const MOS=['1月','2月','3月','4月','5月','6月'];
  function chip(p){
    if(p===null) return '<span class="mch mch-na">—</span>';
    return`<span class="mch ${p>=1?'mch-g':'mch-r'}">${Math.round(p*100)}%</span>`;
  }
  function moCell(key,i){
    const m=DATA[key].months[i];
    if(!m||m.rev===0) return`<td>${chip(null)}</td>`;
    return`<td>${chip(m.achieve)}<div class="mch-rev">${fmtM(m.rev)}</div></td>`;
  }
  function totalCell(key){
    const s=DATA[key];
    return`<td>${chip(s.achieve_h1)}<div class="mch-rev">${fmtM(s.revenue)}</div></td>`;
  }
  function brandMoCell(keys,i){
    let rev=0,tgt=0;
    keys.forEach(k=>{
      const m=DATA[k].months[i]; if(!m) return;
      rev+=m.rev||0;
      tgt+=(m.tgt||(DATA[k].monthly_tgt?DATA[k].monthly_tgt[i]:0)||0);
    });
    if(!rev) return`<td>${chip(null)}</td>`;
    return`<td>${chip(tgt>0?rev/tgt:null)}<div class="mch-rev">${fmtM(rev)}</div></td>`;
  }
  function brandTotCell(keys){
    let rev=0,tgt=0;
    keys.forEach(k=>{rev+=DATA[k].revenue;tgt+=DATA[k].target_h1;});
    return`<td>${chip(tgt>0?rev/tgt:null)}<div class="mch-rev">${fmtM(rev)}</div></td>`;
  }
  function storeRow(key){
    return`<tr>
      <td>${DATA[key].label}</td>
      ${MOS.map((_,i)=>moCell(key,i)).join('')}
      ${totalCell(key)}
    </tr>`;
  }
  function section(keys,label,cls,color){
    const rev=keys.reduce((s,k)=>s+DATA[k].revenue,0);
    const tgt=keys.reduce((s,k)=>s+DATA[k].target_h1,0);
    return`<tr class="mch-brand-hd ${cls}">

function renderTab4(){
  const el=document.getElementById('tab4-body');

  if(!loaded.length){
    el.innerHTML='<div style="padding:40px;text-align:center;color:#888780">資料載入中…</div>';

  }
  if(!MO_SNAP_DATA[_curMoTab]) _curMoTab=loaded[loaded.length-1];
  const moData=MO_SNAP_DATA[_curMoTab]||{};

  // Month tabs row (loaded months + one greyed-out next month)
  const showUntil=Math.min(loaded[loaded.length-1]+2, MO_NAMES.length);

  // Brand totals

    let rev=0,tgt=0,nn=0,on=0,nr=0,or_=0;
    keys.forEach(k=>{const d=moData[k];if(!d)return;rev+=d.total_rev;tgt+=d.target;nn+=d.new_n;on+=d.old_n;nr+=d.new_rev;or_+=d.old_rev;});
    return{rev,tgt,new_n:nn,old_n:on,new_rev:nr,old_rev:or_,
      achieve:tgt>0?rev/tgt:null,
      new_avg:nn>0?Math.round(nr/nn):0,
      old_avg:on>0?Math.round(or_/on):0};
  }
  const kiKeys=KI_STORES.filter(k=>moData[k]);
  const woKeys=WO_STORES.filter(k=>moData[k]);
  const kiT=bTot(kiKeys), woT=bTot(woKeys);
  const tot_rev=kiT.rev+woT.rev, tot_tgt=kiT.tgt+woT.tgt;
  const tot_nn=kiT.new_n+woT.new_n, tot_on=kiT.old_n+woT.old_n;
  const tot_nr=kiT.new_rev+woT.new_rev, tot_or=kiT.old_rev+woT.old_rev;

  function achCls(p){return p===null?'r':p>=1?'g':'r';}

  const _daysInMo=new Date(_now.getFullYear(),_curMoTab+1,0).getDate();

  function dailyProg(rev,tgt){

// Fallback queue: if gviz ignores responseHandler and calls the default handler instead
const _gvizPending=[];
(function(){
  const g=window.google=window.google||{};
  const v=g.visualization=g.visualization||{};

  q.setResponse=function(d){

})();

function loadGviz(sheetName, opts={}){
  return new Promise((resolve,reject)=>{
    const cb='_gviz_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    let done=false;
    function settle(fn,v){ if(!done){ done=true; clearTimeout(timer); cleanup(); fn(v); } }
    let timer=setTimeout(()=>{ settle(reject,new Error('timeout:'+sheetName)); },15000);
    function cleanup(){
      try{ delete window[cb]; s.remove(); }catch(e){}
      const i=_gvizPending.indexOf(resolver); if(i>=0) _gvizPending.splice(i,1);
    }
    const resolver=(d)=>settle(resolve,d);
    window[cb]=resolver;
    _gvizPending.push(resolver);
    const s=document.createElement('script');
    s.onerror=()=>settle(reject,new Error('script error:'+sheetName));
    const param=opts.gid?'gid='+opts.gid:'sheet='+encodeURIComponent(sheetName);
    s.src='https://docs.google.com/spreadsheets/d/'+SHEET_ID+
          '/gviz/tq?tqx=out:json;responseHandler:'+cb+'&'+param;
    document.head.appendChild(s);
  });
}

function cv(row,i){
  if(!row||!row.c||i>=row.c.length) return null;
  const c=row.c[i]; return c?c.v:null;
}
function toN(v){
  if(v===null||v===undefined) return 0;
  if(typeof v==='number') return v;
  const n=parseFloat(String(v).replace(/[^0-9.\-]/g,''));
  return isNaN(n)?0:n;
}

function parseYearSheet(gd){
  const rows=gd.table.rows;
  const MAP={'原渥站前':'wo_zhanqian','原渥大安':'wo_daan','原渥忠孝':'wo_zhongxiao',
    '原渥板橋':'wo_banqiao','原渥東門':'wo_dongmen','原綺台北':'ki_taipei',
    '原渥台中':'wo_taichung','原綺台中':'ki_taichung'};
  const hist={}, tgt={};
  for(let ri=2;ri<rows.length;ri++){
    const r=rows[ri];
    const name=cv(r,0); if(!name||!MAP[name]) continue;
    const k=MAP[name], h=[];
    const r21=toN(cv(r,1)); if(r21) h.push({yr:2021,rev:r21});
    const r22=toN(cv(r,2)); if(r22) h.push({yr:2022,rev:r22});
    const r23=toN(cv(r,4)); if(r23) h.push({yr:2023,rev:r23});
    const r24=toN(cv(r,6)),t24=toN(cv(r,7));
    if(r24) h.push({yr:2024,rev:r24,...(t24?{target:t24}:{})});
    const r25=toN(cv(r,10)),t25=toN(cv(r,11));
    if(r25) h.push({yr:2025,rev:r25,...(t25?{target:t25}:{})});
    hist[k]=h;
    const t26=toN(cv(r,15)); if(t26) tgt[k]=t26;
  }
  return {hist,tgt};
}

function parseStoreSheet(gd,storeMap){
  // Sheet structure: section separator rows have c1="StoreName｜Year" (full-width pipe)
  // Metric rows follow: c1=總業績/新客業績/舊客業績/新客數/舊客數/目標, c2=YTD, cols 3-14=months 1-12
  const rows=gd.table.rows||[];
  const storeMetrics={};
  let curKey=null, curYear=null;

  for(const r of rows){
    const col1=cv(r,1), col1s=col1?String(col1).trim():'';
    // Section separator: sheet uses FULL-WIDTH pipe ｜ (U+FF5C); match both
    const sep=col1s.match(/^(.+)[|｜](\d{4})$/);
    if(sep){
      const storePart=sep[1].trim(), year=parseInt(sep[2]);
      curYear=year;
      if(year===2026 && storeMap[storePart]){
        curKey=storeMap[storePart];
        if(!storeMetrics[curKey]) storeMetrics[curKey]={};
      } else { curKey=null; }
      continue;
    }
    if(!curKey||curYear!==2026) continue;
    if(['總業績','新客業績','舊客業績','新客數','舊客數','目標'].includes(col1s)){
      storeMetrics[curKey][col1s]=r;
    }
  }

  const result={};
  for(const[key,m] of Object.entries(storeMetrics)){
    const revR=m['總業績']; if(!revR) continue;
    const totalRev=toN(cv(revR,2)); if(totalRev<=0) continue;
    const newRevR=m['新客業績'], oldRevR=m['舊客業績'];
    const newCntR=m['新客數'],   oldCntR=m['舊客數'];
    const newRev=toN(cv(newRevR,2)), oldRev=toN(cv(oldRevR,2));
    const newCnt=toN(cv(newCntR,2)), oldCnt=toN(cv(oldCntR,2));
    const tgtR=m['目標'];
    const months=[];
    for(let mo=0;mo<12;mo++){
      months.push({
        m:(mo+1)+'月',
        rev:    toN(cv(revR,   3+mo)),
        new_rev:toN(cv(newRevR,3+mo)),
        old_rev:toN(cv(oldRevR,3+mo)),
        new_n:  toN(cv(newCntR,3+mo)),
        old_n:  toN(cv(oldCntR,3+mo)),
        tgt:    tgtR?toN(cv(tgtR,3+mo)):null,
        achieve:null,
      });
    }
    // Fallback: estimate June from YTD if June=0 but YTD > sum(Jan-May)
    const sum15=months.slice(0,5).reduce((s,mo)=>s+mo.rev,0);
    if(months[5].rev===0 && totalRev>sum15) months[5].rev=totalRev-sum15;
    result[key]={totalRev,newRev,oldRev,totalCnt:newCnt+oldCnt,newCnt,oldCnt,months};
  }
  return result;
}


function parseSrcSheet(gd){
  // Sheet gid=1673065208: monthly per-store new customer source breakdown
  // Col 1=store name, col 3="人數", col 7=行銷, col 8=業務, col 9=團購, col 10=其他
  // Brand context set by rows with col1="原綺" or "原渥"
  const rows=gd.table.rows||[];
  const result={};
  let brandCtx=null;
  // Read the month label from col headers
  const monthLabel=(gd.table.cols[4]||{}).label||'';
  for(const r of rows){
    const c1=String(cv(r,1)||'').trim();
    const c3=String(cv(r,3)||'').trim();
    if(c1==='原綺'){ brandCtx='ki'; continue; }
    if(c1==='原渥'){ brandCtx='wo'; continue; }
    if(!c1||c3!=='人數') continue;
    let key=null;
    if(c1==='台北') key='ki_taipei';
    else if(c1==='台中'&&brandCtx==='ki') key='ki_taichung';
    else if(c1==='站前') key='wo_zhanqian';
    else if(c1==='大安') key='wo_daan';
    else if(c1==='忠孝') key='wo_zhongxiao';
    else if(c1==='東門') key='wo_dongmen';
    else if(c1==='台中'&&brandCtx==='wo') key='wo_taichung';
    else if(c1==='板橋') key='wo_banqiao';
    if(key){
      result[key]={
        行銷:toN(cv(r,7))||0,
        業務:toN(cv(r,8))||0,
        團購:toN(cv(r,9))||0,
        其他:toN(cv(r,10))||0,
        _month:monthLabel,
      };
    }
  }
  return result;
}

async function loadData(){
  document.getElementById('sync-time').textContent='同步中…';
  // Render immediately with hardcoded data
  refreshAll();
  try{
    // Load month tabs for source breakdown + monthly performance (1月–current month)
    const _curMo=new Date().getMonth()+1;
    const _moNames=Array.from({length:_curMo},(_,i)=>(i+1)+'月');
    const [yrGd,kiGd,woGd,...srcGds]=await Promise.all([
      loadGviz('年度'),
      loadGviz('24-26原綺總業績'),
      loadGviz('24-26原渥總業績'),
      ..._moNames.map(n=>loadGviz(n).catch(()=>null)),
    ]);
    // Retry any failed month loads (concurrent requests can get dropped/timed-out)
    for(let i=0;i<srcGds.length;i++){
      if(!srcGds[i]){
        console.log('[retry] loading',_moNames[i]);
        await new Promise(r=>setTimeout(r,400));
        srcGds[i]=await loadGviz(_moNames[i]).catch(()=>null);
        if(srcGds[i]) console.log('[retry ok]',_moNames[i]);
        else console.warn('[retry failed]',_moNames[i]);
      }
    }
    // Update historical + 2026 full-year targets
    const {hist:nh,tgt:nt}=parseYearSheet(yrGd);
    Object.assign(HIST_DATA,nh);
    // Merge sheet targets but protect paired stores (shared targets in PAIRED_STORES take precedence)
    for(const[k,v] of Object.entries(nt)){
      if(!PAIRED_STORES[k]) TARGET_2026[k]=v;
    }
    // Update store data
    const WO_MAP={'站前':'wo_zhanqian','大安':'wo_daan','忠孝':'wo_zhongxiao','板橋':'wo_banqiao','東門':'wo_dongmen','台中':'wo_taichung'};
    const KI_MAP={'台北':'ki_taipei','台中':'ki_taichung'};
    const allStores={...parseStoreSheet(woGd,WO_MAP),...parseStoreSheet(kiGd,KI_MAP)};
    console.log('[sync] found stores:',Object.keys(allStores).join(','));
    const _kit=allStores.ki_taipei;
    if(_kit) console.log('[sync] ki_taipei jun rev:',_kit.months[5]?.rev,'YTD:',_kit.totalRev);
    else console.warn('[sync] ki_taipei NOT FOUND');
    for(const[k,ss]of Object.entries(allStores)){
      const d=DATA[k]; if(!d||ss.totalRev<=0) continue;
      d.revenue=ss.totalRev; d.new_rev=ss.newRev; d.old_rev=ss.oldRev;
      d.new_count=ss.newCnt; d.old_count=ss.oldCnt;
      d.new_avg=ss.newCnt>0?Math.round(ss.newRev/ss.newCnt):0;
      d.old_avg=ss.oldCnt>0?Math.round(ss.oldRev/ss.oldCnt):0;
      d.achieve_h1=d.target_h1>0?ss.totalRev/d.target_h1:0;
      // Monthly achieve: priority: Sheet 目標 row → DATA.monthly_tgt → H1/6 fallback
      const fallbackMTgt=d.target_h1/6;
      // Back-calc implied targets from hardcoded achieve×rev (computed BEFORE sync overwrites months)
      // Priority: explicit monthly_tgt > implied-from-hardcode > sheet tgt > H1/6 fallback
      const impliedTgt=(d.months||[]).map(m=>
        (m.rev>0&&m.achieve)?Math.round(m.rev/m.achieve):0
      );
      d.months=ss.months.map((m,idx)=>{
        const tgt=(d.monthly_tgt&&d.monthly_tgt[idx])||impliedTgt[idx]||m.tgt||fallbackMTgt;
        return {...m,achieve:m.rev>0&&tgt>0?m.rev/tgt:null,tgt:tgt||null};
      });
    }
    // Sum per-store new customer source breakdown across all loaded months
    const srcData={};
    for(const gd of srcGds){
      if(!gd) continue;
      const mo=parseSrcSheet(gd);
      for(const[k,src] of Object.entries(mo)){
        if(!srcData[k]) srcData[k]={行銷:0,業務:0,團購:0,其他:0,_label:'H1累計'};
        srcData[k].行銷+=src.行銷||0;
        srcData[k].業務+=src.業務||0;
        srcData[k].團購+=src.團購||0;
        srcData[k].其他+=src.其他||0;
      }
    }
    for(const[k,src] of Object.entries(srcData)){
      if(DATA[k]) DATA[k].new_src=src;
    }
    // Build per-month snapshot for monthly performance tab
    MO_SNAP_DATA=new Array(12).fill(null);
    for(let i=0;i<srcGds.length;i++){
      if(srcGds[i]) MO_SNAP_DATA[i]=parseMoSheet(srcGds[i]);
    }
    const lastLoaded=srcGds.filter(Boolean).length-1;
    if(lastLoaded>=0) _curMoTab=lastLoaded;
    const now=new Date();
    document.getElementById('sync-time').textContent=
      '已同步 '+now.toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    refreshAll();
  }catch(err){
    console.error('Sheets sync failed:',err.message, err);
    document.getElementById('sync-time').textContent='離線模式（本地資料）';
  }
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
loadData();
</script>
