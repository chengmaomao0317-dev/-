.nav-inner{display:flex;align-items:center;padding:0 32px;height:44px;gap:6px;max-width:1600px;margin:0 auto}
.nav-item{font-size:12px;padding:4px 12px;border-radius:6px;border:none;cursor:pointer;font-weight:500;background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);transition:background .15s;white-space:nowrap}

.nav-filter select{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:0.5px solid rgba(255,255,255,.15);border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer}
.nav-filter select option{background:#111}

.tab-content.active{display:block}

.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi-card{background:#fff;border:0.5px solid rgba(0,0,0,.08);border-radius:10px;padding:12px 16px}

.sc-sub{font-size:9px;color:#888780;margin-top:1px}

.badge-g{background:#d4edda;color:#1a6b3c}
.badge-y{background:#fff3cd;color:#856404}
.badge-r{background:#fce4e4;color:#c0392b}
/* ── Metrics table in card ── */
.mt{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:9px}

.mt th:first-child{text-align:left;font-size:9px}
.mt td{padding:3px 4px;text-align:right;border-bottom:0.5px solid rgba(0,0,0,.04);color:#1a1a18}
.mt td:first-child{text-align:left;font-weight:600;color:#444;font-size:9px}

/* ── Progress bar ── */
.prog-wrap{margin-bottom:9px}
.prog-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}

.month-sec{margin-bottom:0}

.month-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px}

.divider{height:0.5px;background:rgba(0,0,0,.07);margin:8px 0}

.store-tbl-card{background:#fff;border:0.5px solid rgba(0,0,0,.09);border-radius:9px;padding:11px 13px}

.perf-tbl .subtotal td{font-weight:600;color:#888;font-size:9px}
/* ── Brand badge pill ── */
.brand-pill{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.3px}
.bp-ki{background:#fde8f0;color:#c04070}
.bp-wo{background:#e8effe;color:#2d5a9e}
.bp-ec{background:#e8f5e9;color:#2e7d32}

.sec-sep{margin:16px 0 12px;border-top:0.5px dashed rgba(0,0,0,.12);padding-top:14px}
.sec-title{font-size:13px;font-weight:700;color:#1a1a18;margin-bottom:10px}

.src-legend{display:flex;gap:7px;flex-wrap:wrap}

.yoy-up{background:#e8f5e9;color:#2a7a4a}
.yoy-dn{background:#fce4e4;color:#c0392b}
.yoy-fl{background:#f5f3ee;color:#888780}

.ytbl .yr-sep{border-left:0.5px solid rgba(0,0,0,.08)}

.ach-g{background:#EAF3DE;color:#3B6D11}.ach-b{background:#E6F1FB;color:#185FA5}
.ach-o{background:#FAEEDA;color:#854F0B}.ach-r{background:#FCEBEB;color:#A32D2D}

.trend-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.tcard{background:#fff;border:0.5px solid rgba(0,0,0,.09);border-radius:10px;padding:12px 14px}
.tc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.tc-name{font-size:11px;font-weight:700;color:#1a1a18}
.tc-rev{font-size:17px;font-weight:700;color:#1a1a18;line-height:1;margin-bottom:2px}
.tc-yoy{font-size:10px;margin-bottom:8px}
.chart-wrap{position:relative;height:68px}
.yr-axis{display:flex;justify-content:space-between;margin-top:2px}
.yr-axis span{font-size:8px;color:#888780}

/* ══ 每月業績狀況進度 Tab ══ */
.mo-tabs-wrap{display:flex;gap:4px;margin-bottom:14px;background:#f0ede8;padding:4px;border-radius:10px;width:fit-content}
.mo-tab-btn{padding:5px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:#888;background:none;border:none;transition:background .12s}

.mo-bc{border-radius:12px;padding:13px 15px}
.mo-bc.ki{background:#fde8f0;border:.5px solid #e8a0b8}
.mo-bc.wo{background:#e8effe;border:.5px solid #a0b8e8}
.mo-bc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mo-bc-name{font-size:13px;font-weight:700}

.mo-bc-chip.g{background:rgba(26,107,60,.12);color:#1a6b3c}
.mo-bc-plabel{display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px}

.mo-bc-track{height:5px;background:rgba(0,0,0,.1);border-radius:3px;overflow:hidden;margin-bottom:10px}
.mo-bc-fill{height:100%;border-radius:3px}
.mo-bc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.mo-bc-stat{text-align:center}
.mo-bc-stat-label{font-size:9px;color:#888780}
.mo-bc-stat-val{font-size:12px;font-weight:600;color:#1a1a18;margin-top:2px}
.mo-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.mo-kpi{background:#fff;border:.5px solid rgba(0,0,0,.09);border-radius:10px;padding:10px 13px}
.mo-kpi-label{font-size:10px;color:#888780;margin-bottom:2px}
.mo-kpi-val{font-size:16px;font-weight:700;color:#1a1a18}

let KI_TOTAL_REV=0, WO_TOTAL_REV=0, KI_TARGET_H1=0, WO_TARGET_H1=0, TOTAL_REV=0, TOTAL_TARGET=0;
let KI_TARGET_YR=0, WO_TARGET_YR=0, TOTAL_TARGET_YR=0;
function recalcTotals(){
  KI_TOTAL_REV = KI_STORES.reduce((s,k)=>s+DATA[k].revenue,0);
  WO_TOTAL_REV = WO_STORES.reduce((s,k)=>s+DATA[k].revenue,0);
  KI_TARGET_H1 = KI_STORES.reduce((s,k)=>s+DATA[k].target_h1,0);
  WO_TARGET_H1 = WO_STORES.reduce((s,k)=>s+DATA[k].target_h1,0);
  TOTAL_REV    = KI_TOTAL_REV + WO_TOTAL_REV;
  TOTAL_TARGET = KI_TARGET_H1 + WO_TARGET_H1;
  // Full-year annual targets — paired stores counted once via isFirst
  const _allKeys=[...KI_STORES,...WO_STORES];
  TOTAL_TARGET_YR = _allKeys.reduce((s,k)=>{
    const pair=PAIRED_STORES[k];
    if(pair && !pair.isFirst) return s;           // skip: shared target already added by partner
    if(pair)  return s+(pair.sharedTgt[2026]||0); // count shared target once
    return s+(TARGET_2026[k]||0);                 // individual annual target
  },0);
  // Brand-level annual targets (fixed per management plan)
  KI_TARGET_YR = 118600000;
  WO_TARGET_YR = 103900000;
  TOTAL_TARGET_YR = 222500000;
}

function fmtM(n){return n?'$'+Math.round(n).toLocaleString():'$0'}
function fmtK(n){return n>=1000?'$'+(n/1000).toFixed(0)+'K':'$'+Math.round(n)}
function fmtFull(n){return n?'$'+Math.round(n).toLocaleString():null}
function fmtN(n){return n.toLocaleString()}
function fmtPct(p){return Math.round(p*100)+'%'}
function pctColor(p){return p>=1?'#2a7a4a':p>=0.8?'#5b8dee':p>=0.7?'#f0a030':'#e27575'}
function pctTextColor(p){return p>=1?'#2a7a4a':'#c0392b'}
function achieveBadge(p){
  if(p>=1) return ['badge-g','達標'];
  return ['badge-r','落後'];
}
function monthBarColor(p){
  if(p===null) return '#ddd';
  if(p>=1) return '#2a7a4a';
  if(p>=0.8) return '#5b8dee';
  if(p>=0.7) return '#f0a030';
  return '#e27575';
}
function yoyBadge(y){
  if(y===null) return '<span class="yoy yoy-fl">新開店</span>';
  const cls = y>0?'yoy-up':y<0?'yoy-dn':'yoy-fl';
  return `<span class="yoy ${cls}">${Math.round(y*100)}% YOY</span>`;
}

function renderStoreCard(s){
  const [badgeClass, badgeText] = achieveBadge(s.achieve_h1);
  const pct_bar = Math.min(s.achieve_h1,1)*100;
  const bar_color = pctColor(s.achieve_h1);
  const new_pct = s.revenue>0?(s.new_rev/s.revenue*100).toFixed(0):0;
  const old_pct = 100-new_pct;
  const gap = s.target_h1-s.revenue;
  const total_count = s.new_count + s.old_count;

  // Monthly bars
  const monthBars = s.months.map(m=>{
    const h = m.achieve===null ? 0 : Math.min(m.achieve,1.5)/1.5*100;
    const color = monthBarColor(m.achieve);
    const pctText = m.achieve===null ? (m.rev>0?'—':'—') : fmtPct(m.achieve);
    const pctColor2 = m.achieve===null?'#bbb':pctTextColor(m.achieve);
    return `<div class="mc">
      <div class="mc-wrap"><div class="mc-bar" style="height:${h}%;background:${color}"></div></div>
      <div class="mc-pct" style="color:${pctColor2}">${pctText}</div>
      <div class="mc-lbl">${m.m}</div>
    </div>`;
  }).join('');

  return `<div class="sc">
    <div class="sc-head">
      <div>
        <div class="sc-name">${s.label}</div>
        <div class="sc-sub">H1目標 ${fmtM(s.target_h1)}</div>
      </div>
      <span class="sc-badge ${badgeClass}">${badgeText} ${fmtPct(s.achieve_h1)}</span>
    </div>

    <table class="mt">
      <tr><th></th><th>業績</th><th>人數</th><th>客單</th></tr>
      <tr class="section-row"><td colspan="4">新客</td></tr>
      <tr>
        <td>新客</td>
        <td>${fmtM(s.new_rev)}</td>
        <td>${fmtN(s.new_count)}</td>
        <td>${fmtK(s.new_avg)}</td>
      </tr>
      <tr class="section-row"><td colspan="4">舊客</td></tr>
      <tr>
        <td>舊客</td>
        <td>${fmtM(s.old_rev)}</td>
        <td>${fmtN(s.old_count)}</td>
        <td>${fmtK(s.old_avg)}</td>
      </tr>
      <tr class="total-row">
        <td>合計</td>
        <td>${fmtM(s.revenue)}</td>
        <td>${fmtN(total_count)}</td>
        <td>${fmtK(s.revenue>0?s.revenue/total_count:0)}</td>
      </tr>
    </table>

    <div class="mix-wrap">
      <div class="mix-label">
        <span>新客 ${new_pct}% 佔比</span>
        <span>舊客 ${old_pct}%</span>
      </div>
      <div class="mix-bar">
        <div style="width:${new_pct}%;background:#5b8dee"></div>
        <div style="width:${old_pct}%;background:#e8c86e"></div>
      </div>
    </div>

    <div class="prog-wrap">
      <div class="prog-label">
        <span>H1 累計進度</span>
        <strong style="color:${bar_color}">${fmtPct(s.achieve_h1)}　${gap>0?'差 '+fmtM(gap):'超標'}</strong>
      </div>
      <div class="prog-bar">
        <div class="prog-fill" style="width:${pct_bar}%;background:${bar_color}"></div>

    <div class="month-sec">
      <div class="month-sec-label">月度達成率</div>
      <div class="month-grid">${monthBars}</div>
    </div>
  </div>`;
}

function renderSrcBar(brandKey){
  const src = BRAND_SOURCES[brandKey];
  const total = Object.values(src).reduce((a,b)=>a+b,0);
  const colors = {行銷:'#5b8dee',業務:'#e27575',團購:'#f0a030',其他:'#5bbf8a'};
  const bars = Object.entries(src).map(([k,v])=>
    `<div style="width:${(v/total*100).toFixed(1)}%;background:${colors[k]}"></div>`
  ).join('');
  const legend = Object.entries(src).map(([k,v])=>
    `<div class="src-item"><div class="src-dot" style="background:${colors[k]}"></div>${k} ${(v/total*100).toFixed(0)}%（${v}人）</div>`
  ).join('');
  return `<div class="src-mini">
    <div class="src-bar-full">${bars}</div>
    <div class="src-legend">${legend}</div>
  </div>`;
}

  return `<span class="${cls}">${Math.round(d*100)}%</span>`;

    const yr26tgt=TARGET_2026[key]||null;
    const pair=PAIRED_STORES[key]||null;

    // Row style — background only, no borders
    let rowStyle='';
    if(pair) rowStyle=`style="background:${pair.bg}"`;

    // Name cell
    const bpClass=s.brandKey==='ki'?'bp-ki':'bp-wo';
    const bl='';
    const bg=pair?`background:${pair.bg};`:'';
    let cells=`<td style="${bl}${bg}"><span class="brand-pill ${bpClass}" style="font-size:8px;padding:1px 5px">${s.brand}</span> ${s.label}</td>`;

    let prevRev=null;
    YEARS.forEach(yr=>{
      const d=hm[yr];
      const rev=d?d.rev:null;
      const tgt=d?d.target:null;
      if(yr<=2022){
        if(yr===2021){
          cells+=`<td class="yr-sep">${revCell(rev)}</td>`;
        } else {
          cells+=`<td class="yr-sep">${revCell(rev)}</td><td>${yoyTxt(rev,prevRev)}</td>`;
        }
      } else if(yr<2025){
        cells+=`<td class="yr-sep">${revCell(rev)}</td><td>${tgtCell(tgt)}</td><td>${achChip(rev,tgt)}</td><td>${yoyTxt(rev,prevRev)}</td>`;
      } else {
        // yr===2025 — shared target for paired stores
        if(pair && pair.isFirst){
          const pHm=histMap(pair.partner);
          const pRev25=(pHm[2025]&&pHm[2025].rev)||0;
          const sT25=pair.sharedTgt[2025];
          cells+=`<td class="yr-sep">${revCell(rev)}</td>`;
          cells+=`<td rowspan="2" style="background:${pair.bg};vertical-align:middle;text-align:center">`
                +`<div style="font-weight:700;color:#4A3820;font-size:10.5px">${fmtFull(sT25)}</div>`
                +`<div style="font-size:8.5px;color:${pair.borderColor};margin-top:2px">${pair.badge} 共同目標</div></td>`;
          cells+=`<td rowspan="2" style="background:${pair.bg};vertical-align:middle;text-align:center">${achChip((rev||0)+pRev25,sT25)}</td>`;
          cells+=`<td>${yoyTxt(rev,prevRev)}</td>`;
        } else if(pair){
          // Second in pair — tgt+ach cells already covered by rowspan above
          cells+=`<td class="yr-sep">${revCell(rev)}</td>`;
          cells+=`<td>${yoyTxt(rev,prevRev)}</td>`;
        } else {
          cells+=`<td class="yr-sep">${revCell(rev)}</td><td>${tgtCell(tgt)}</td><td>${achChip(rev,tgt)}</td><td>${yoyTxt(rev,prevRev)}</td>`;
        }
      }
      if(rev) prevRev=rev;
    });

    // 2026 H1
    const yoyHtml=yoyBadge(s.yoy_h1).replace('span class="yoy','span class="ach').replace('yoy-up','ach-g').replace('yoy-dn','ach-r').replace('yoy-fl','ach-o');
    if(pair && pair.isFirst){
      const sT26=pair.sharedTgt[2026];
      const pRev26=DATA[pair.partner].revenue;
      cells+=`<td class="yr-sep" style="color:#5b8dee;font-weight:600">${fmtM(yr26rev)}</td>`;
      cells+=`<td rowspan="2" style="background:${pair.bg};vertical-align:middle;text-align:center">`
            +`<div style="font-weight:700;color:#4A3820;font-size:10.5px">${fmtFull(sT26)}</div>`
            +`<div style="font-size:8.5px;color:${pair.borderColor};margin-top:2px">${pair.badge} 共同目標</div></td>`;
      cells+=`<td rowspan="2" style="background:${pair.bg};vertical-align:middle;text-align:center">${achChip(yr26rev+pRev26,sT26)}</td>`;
      cells+=`<td>${yoyHtml}</td>`;
    } else if(pair){
      cells+=`<td class="yr-sep" style="color:#5b8dee;font-weight:600">${fmtM(yr26rev)}</td>`;
      cells+=`<td>${yoyHtml}</td>`;
    } else {
      cells+=`<td class="yr-sep" style="color:#5b8dee;font-weight:600">${fmtM(yr26rev)}</td>`;
      cells+=`<td>${tgtCell(yr26tgt)}</td>`;
      cells+=`<td>${achChip(yr26rev,yr26tgt)}</td>`;
      cells+=`<td>${yoyHtml}</td>`;
    }

    return `<tr ${rowStyle}>${cells}</tr>`;
  }

  // Total row
  function totalRow(){
    const allKeys=[...WO_STORES,...KI_STORES];
    let cells='<td>TOTAL</td>';
    let prevRev=null;
    YEARS.forEach(yr=>{
      const rev=allKeys.reduce((s,k)=>{const d=histMap(k)[yr];return s+(d?d.rev:0);},0)||null;
      const tgt=allKeys.reduce((s,k)=>{const d=histMap(k)[yr];return s+(d&&d.target?d.target:0);},0)||null;
      if(yr===2021){
        cells+=`<td class="yr-sep">${revCell(rev)}</td>`;
      } else if(yr===2022){
        cells+=`<td class="yr-sep">${revCell(rev)}</td><td>${yoyTxt(rev,prevRev)}</td>`;
      } else {
        cells+=`<td class="yr-sep">${revCell(rev)}</td><td>${tgtCell(tgt)}</td><td>${achChip(rev,tgt)}</td><td>${yoyTxt(rev,prevRev)}</td>`;
      }
      if(rev) prevRev=rev;
    });
    const t26=TOTAL_REV, tgt26=TOTAL_TARGET;
    cells+=`<td class="yr-sep" style="color:#5b8dee;font-weight:700">${fmtM(t26)}</td><td>${tgtCell(tgt26)}</td><td>${achChip(t26,tgt26)}</td><td>—</td>`;
    return `<tr>${cells}</tr>`;
  }

  const allRows=ALL_STORES.map(storeRow).join('');

  // Trend chart cards
  function trendCard(key,idx){
    const s=DATA[key];
    const hm=histMap(key);
    const badgeClass=s.achieve_h1>=1?'ach-g':'ach-r';
    const yoyHtml=s.yoy_h1===null?'<span class="txt-na">新開幕</span>':(s.yoy_h1>=0?`<span class="txt-up">▲ ${Math.round(s.yoy_h1*100)}% YOY</span>`:`<span class="txt-dn">▼ ${Math.round(s.yoy_h1*100)}% YOY</span>`);
    const allYrs=[...YEARS.filter(y=>hm[y]&&hm[y].rev),2026];
    const axisLabels=allYrs.map(y=>y===2026?"'26H1":"'"+String(y).slice(2));
    return `<div class="tcard">
      <div class="tc-head">
        <div class="tc-name">${s.brand} ${s.label}</div>
        <span class="ach ${badgeClass}">H1 ${fmtPct(s.achieve_h1)}</span>
      </div>
      <div class="tc-rev">${fmtM(s.revenue)}</div>
      <div class="tc-yoy">${yoyHtml}</div>
      <div class="chart-wrap"><canvas id="tc${idx}" role="img" aria-label="${s.label}歷年業績趨勢"></canvas></div>
      <div class="yr-axis">${axisLabels.map(l=>`<span>${l}</span>`).join('')}</div>
    </div>`;
  }

  const trendCards=ALL_STORES.map((k,i)=>trendCard(k,i)).join('');

  document.getElementById('tab1-body').innerHTML = `
    <!-- Year table -->
    <div class="ytbl-wrap">
      <table class="ytbl">
        <thead>
          <tr>
            <th rowspan="2">門市</th>
            <th colspan="1" style="border-left:0.5px solid rgba(255,255,255,.12)">2021</th>
            <th colspan="2" style="border-left:0.5px solid rgba(255,255,255,.12)">2022</th>
            <th colspan="4" style="border-left:0.5px solid rgba(255,255,255,.12)">2023</th>
            <th colspan="4" style="border-left:0.5px solid rgba(255,255,255,.12)">2024</th>
            <th colspan="4" style="border-left:0.5px solid rgba(255,255,255,.12)">2025</th>
            <th colspan="4" style="border-left:0.5px solid rgba(255,255,255,.12);color:#7ab3ff">2026 H1</th>
          </tr>
          <tr>
            <th class="yr-sep">業績</th>
            <th class="yr-sep">業績</th><th>YOY</th>
            <th class="yr-sep">業績</th><th>目標</th><th>達成</th><th>YOY</th>
            <th class="yr-sep">業績</th><th>目標</th><th>達成</th><th>YOY</th>
            <th class="yr-sep">業績</th><th>目標</th><th>達成</th><th>YOY</th>
            <th class="yr-sep" style="color:#7ab3ff">業績</th><th>年目標</th><th>達成</th><th>YOY</th>
          </tr>
        </thead>
        <tbody>
          ${allRows}
        </tbody>
        <tfoot>${totalRow()}</tfoot>
      </table>
    </div>

    <!-- Legend -->
    <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
      <span style="font-size:10px;color:#888780">達成率色碼：</span>
      <span class="ach ach-g">≥100%</span>
      <span class="ach ach-r">&lt;100%</span>
      <span style="font-size:10px;color:#aaa;margin-left:8px">※ 2026 欄為 H1 累計，年目標為全年目標</span>
      <span style="font-size:10px;color:#8B7355;margin-left:8px">① 東門＋台北　② 台中原渥＋台中原綺　共同目標達成率為兩店合計</span>
    </div>

    <!-- Trend charts -->
    <div class="trend-sep">各門市歷年業績趨勢</div>
    <div style="display:flex;gap:10px;margin-bottom:10px;font-size:10px;color:#888780;align-items:center">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:18px;height:2px;background:#185FA5;display:inline-block;border-radius:1px"></span>實際業績</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:18px;height:2px;background:#f0a030;display:inline-block;border-radius:1px;border-top:2px dashed #f0a030;height:0"></span>年度目標</span>
    </div>
    <div class="trend-grid">${trendCards}</div>
  `;

  // Init Chart.js trend charts
  const lineBlue='#185FA5', lineFill='rgba(24,95,165,0.07)', targetOrange='#f0a030';
  ALL_STORES.forEach((key,idx)=>{
    const s=DATA[key];
    const hm=histMap(key);
    const pts=YEARS.filter(y=>hm[y]&&hm[y].rev).map(y=>({yr:y,rev:hm[y].rev/1e6,tgt:hm[y].target?hm[y].target/1e6:null}));
    // add 2026 H1
    pts.push({yr:2026,rev:s.revenue/1e6,tgt:TARGET_2026[key]?TARGET_2026[key]/1e6:null});

    const labels=pts.map(p=>p.yr===2026?"'26H1":"'"+String(p.yr).slice(2));
    const revData=pts.map(p=>p.rev);
    const tgtData=pts.map(p=>p.tgt);
    const hasTgt=tgtData.some(v=>v!==null);

    const ctx=document.getElementById('tc'+idx);
    if(!ctx) return;
    const chart=new Chart(ctx,{
      type:'line',
      data:{
        labels,
        datasets:[
          {label:'業績',data:revData,borderColor:lineBlue,borderWidth:2,pointRadius:3,pointBackgroundColor:lineBlue,pointBorderWidth:0,fill:true,backgroundColor:lineFill,tension:0.3,spanGaps:false},
          ...(hasTgt?[{label:'目標',data:tgtData,borderColor:targetOrange,borderWidth:1.5,borderDash:[4,3],pointRadius:2,pointBackgroundColor:targetOrange,pointBorderWidth:0,fill:false,tension:0.3,spanGaps:true}]:[])
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'$'+Math.round(c.parsed.y*1e6).toLocaleString()}}},
        scales:{x:{display:false},y:{display:false,grace:'20%'}},
        animation:{duration:400}
      }
    });
    _trendCharts.push(chart);
  });
}

function renderStorePerfTable(s){
  const rows = s.months.map(m=>{
    if(m.rev===0 && m.new_n===0) return `<tr><td>${m.m}</td><td colspan="6" style="color:#ccc;font-size:9px">— 尚未開業 —</td></tr>`;
    const imp_target = m.achieve ? Math.round(m.rev/m.achieve) : null;
    const achieveStr = m.achieve!==null ? fmtPct(m.achieve) : '—';
    const achieveColor = m.achieve!==null ? pctTextColor(m.achieve) : '#bbb';
    const tgtStr = imp_target ? fmtM(imp_target) : '—';
    return `<tr>
      <td>${m.m}</td>
      <td>${fmtM(m.new_rev)}</td>
      <td>${m.new_n}</td>
      <td>${fmtM(m.old_rev)}</td>
      <td>${m.old_n}</td>
      <td>${fmtM(m.rev)}</td>
      <td style="color:${achieveColor};font-weight:600">${achieveStr}</td>
    </tr>`;
  }).join('');

  const total_count = s.new_count + s.old_count;
  return `<div class="store-tbl-card">
    <div class="store-tbl-title">
      <span class="brand-pill ${s.brandKey==='ki'?'bp-ki':'bp-wo'}">${s.brand}</span>
      ${s.label}
      <span style="margin-left:auto;font-size:10px;color:#888780">H1目標 ${fmtM(s.target_h1)}</span>
      <span style="font-size:10px;font-weight:700;color:${pctTextColor(s.achieve_h1)}">${fmtPct(s.achieve_h1)}</span>
      ${yoyBadge(s.yoy_h1)}
    </div>
    <table class="perf-tbl">
      <tr>
        <th>月份</th>
        <th>新客業績</th><th>新客數</th>
        <th>舊客業績</th><th>舊客數</th>
        <th>總業績</th>
        <th>達成率</th>
      </tr>
      ${rows}
      <tr>
        <td>合計</td>
        <td>${fmtM(s.new_rev)}</td><td>${fmtN(s.new_count)}</td>
        <td>${fmtM(s.old_rev)}</td><td>${fmtN(s.old_count)}</td>
        <td>${fmtM(s.revenue)}</td>
        <td style="color:${pctTextColor(s.achieve_h1)}">${fmtPct(s.achieve_h1)}</td>
      </tr>
    </table>
  </div>`;
}

function renderStoreDetail(s){
  const [badgeClass, badgeText] = achieveBadge(s.achieve_h1);
  // Per-store source data (from sync) takes priority over brand aggregate
  const srcRaw = s.new_src || BRAND_SOURCES[s.brandKey];
  const src = {行銷:srcRaw.行銷||0, 業務:srcRaw.業務||0, 團購:srcRaw.團購||0, 其他:srcRaw.其他||0};
  const srcTotal = Object.values(src).reduce((a,b)=>a+b,0);
  const srcLabel = s.new_src ? (s.new_src._label||'H1累計') : '品牌整體';
  const srcTitle = `新客來源分析（${srcLabel}）`;
  const colors = {行銷:'#5b8dee',業務:'#e27575',團購:'#f0a030',其他:'#5bbf8a'};
  const newColor = s.brandKey==='wo' ? '#5b8dee' : '#e87b8d';
  const oldColor = '#e8c86e';

  const srcBars = Object.entries(src).map(([k,v])=>
    `<div style="width:${(v/srcTotal*100).toFixed(1)}%;background:${colors[k]}"></div>`
  ).join('');
  const srcLegend = Object.entries(src).map(([k,v])=>
    `<div class="src-item"><div class="src-dot" style="background:${colors[k]}"></div>${k}：${v}人 (${srcTotal>0?(v/srcTotal*100).toFixed(0):0}%)</div>`
  ).join('');

  const TGT_CELL = 'background:#f5f3ee;border-left:0.5px solid #dbd8d0';

  const monthRows = s.months.map((m,idx)=>{
    const isEmpty = m.rev===0 && m.new_n===0;
    if(isEmpty && idx>=6) return '';  // H2 無資料直接隱藏
    if(isEmpty) return `<tr>
      <td>${m.m}</td>
      <td colspan="7" style="color:#ccc;font-size:9px;text-align:center">— 尚未累完 —</td>
    </tr>`;
    // Priority: m.tgt (from sync) → monthly_tgt[idx] (hardcoded) → back-calc from achieve
    const tgt = m.tgt||(s.monthly_tgt?s.monthly_tgt[idx]:null)||((m.achieve&&m.achieve>0&&m.rev>0)?Math.round(m.rev/m.achieve):null);
    const achStr = m.achieve!==null ? `<span style="color:${pctTextColor(m.achieve)}">${fmtPct(m.achieve)}</span>` : '—';
    return `<tr>
      <td>${m.m}</td>
      <td>${fmtM(m.new_rev)}</td><td>${m.new_n||'—'}</td>
      <td>${fmtM(m.old_rev)}</td><td>${m.old_n||'—'}</td>
      <td>${fmtM(m.rev)}</td>
      <td style="${TGT_CELL}">${tgt?fmtM(tgt):'—'}</td>
      <td>${achStr}</td>
    </tr>`;
  }).filter(Boolean).join('');

  const new_pct_total = s.revenue>0?Math.round(s.new_rev/s.revenue*100):0;

  return `<div class="store-tbl-card">
    <div class="store-tbl-title">
      <span class="brand-pill ${s.brandKey==='ki'?'bp-ki':'bp-wo'}">${s.brand}</span>
      ${s.label}
      <span class="sc-badge ${badgeClass}" style="font-size:9px;padding:2px 7px;border-radius:12px;font-weight:600;margin-left:8px">${badgeText} ${fmtPct(s.achieve_h1)}</span>
      ${yoyBadge(s.yoy_h1)}
      <span style="margin-left:auto;font-size:10px;color:#888780">累計 ${fmtM(s.revenue)}｜新客 ${fmtN(s.new_count)} 人｜舊客 ${fmtN(s.old_count)} 人</span>
    </div>

    <table class="perf-tbl" style="font-size:9.5px;margin-bottom:12px">
      <tr>
        <th>月份</th>
        <th>新客業績</th><th>新客數</th>
        <th>舊客業績</th><th>舊客數</th>
        <th>總業績</th>
        <th style="background:#f5f3ee;color:#6b6860;border-left:0.5px solid #dbd8d0;font-weight:600">當月目標</th>
        <th>達成率</th>
      </tr>
      ${monthRows}
      <tr>
        <td>合計</td>
        <td>${fmtM(s.new_rev)}</td><td>${fmtN(s.new_count)}</td>
        <td>${fmtM(s.old_rev)}</td><td>${fmtN(s.old_count)}</td>
        <td>${fmtM(s.revenue)}</td>
        <td style="${TGT_CELL}">${s.target_h1?fmtM(s.target_h1):'—'}</td>
        <td><span style="color:${pctTextColor(s.achieve_h1)}">${fmtPct(s.achieve_h1)}</span></td>
      </tr>
    </table>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="background:#f7f5f1;border-radius:8px;padding:12px">
        <div style="font-size:10px;font-weight:600;color:#444;margin-bottom:8px">${srcTitle}</div>
        <div style="height:8px;border-radius:4px;overflow:hidden;display:flex;margin-bottom:10px">${srcBars}</div>
        <div class="src-legend" style="flex-direction:column;gap:5px">${srcLegend}</div>
      </div>
      <div style="background:#f7f5f1;border-radius:8px;padding:12px">
        <div style="font-size:10px;font-weight:600;color:#444;margin-bottom:8px">新舊客業績結構</div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
          <div><div style="font-size:9px;color:#888780">新客業績</div><div style="font-size:18px;font-weight:700;color:${newColor}">${new_pct_total}%</div></div>
          <div style="text-align:right"><div style="font-size:9px;color:#888780">舊客業績</div><div style="font-size:18px;font-weight:700;color:${oldColor}">${100-new_pct_total}%</div></div>
        </div>
        <div style="height:8px;border-radius:4px;overflow:hidden;display:flex;margin-bottom:6px">
          <div style="width:${new_pct_total}%;background:${newColor}"></div>
          <div style="width:${100-new_pct_total}%;background:${oldColor}"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:9px;color:#888;margin-bottom:6px">
          <span>${fmtM(s.new_rev)}</span><span>${fmtM(s.old_rev)}</span>
        </div>
        <div style="font-size:9px;color:#888780;padding-top:6px;border-top:0.5px solid #dbd8d0">
          累計 ${fmtM(s.revenue)}｜新客 ${fmtN(s.new_count)} 人｜舊客 ${fmtN(s.old_count)} 人
        </div>
      </div>
    </div>
  </div>`;
}

let MO_SNAP_DATA=[];   // index 0=1月, 1=2月, …
let _curMoTab=0;

function parseMoSheet(gd){
  const rows=gd.table.rows||[];
  const result={};
  let brand=null;
  for(let ri=0;ri<rows.length;ri++){
    const r=rows[ri];
    const c1=String(cv(r,1)||'').trim();
    const c3=String(cv(r,3)||'').trim();
    if(c1==='原綺'){brand='ki';continue;}
    if(c1==='原渥'){brand='wo';continue;}
    if(!brand) continue;
    if(c3!=='人數') continue;
    let key=null;
    if(c1==='台北') key='ki_taipei';
    else if(c1==='台中'&&brand==='ki') key='ki_taichung';
    else if(c1==='站前') key='wo_zhanqian';
    else if(c1==='大安') key='wo_daan';
    else if(c1==='忠孝') key='wo_zhongxiao';
    else if(c1==='東門') key='wo_dongmen';
    else if(c1==='台中'&&brand==='wo') key='wo_taichung';
    else if(c1==='板橋') key='wo_banqiao';
    if(!key) continue;
    const new_n=toN(cv(r,5)), old_n=toN(cv(r,6));
    const src_new={行銷:toN(cv(r,7)),業務:toN(cv(r,8)),團購:toN(cv(r,9)),其他:toN(cv(r,10))};
    const src_old={行銷:toN(cv(r,11)),業務:toN(cv(r,12)),團購:toN(cv(r,13)),其他:toN(cv(r,14))};
    const r2=rows[ri+1]||null;
    const target=r2?Math.abs(toN(cv(r2,2))):0;
    const total_rev=r2?toN(cv(r2,4)):0, new_rev=r2?toN(cv(r2,5)):0, old_rev=r2?toN(cv(r2,6)):0;
    const r3=rows[ri+2]||null;
    const achStr=r3?String(cv(r3,2)||'').replace('%',''):'';
    const achieve=achStr?parseFloat(achStr)/100:null;
    const new_avg=r3?Math.abs(toN(cv(r3,5))):0, old_avg=r3?Math.abs(toN(cv(r3,6))):0;
    result[key]={new_n,old_n,src_new,src_old,target,total_rev,new_rev,old_rev,achieve,new_avg,old_avg};
  }
  return result;
}

const SHEET_ID = '1sdjXTUo1tW9-fLWlUaWnXqNxxdzK573YuUSJcZdWSns';

function loadGviz(sheetName, opts={}){
  return new Promise((resolve,reject)=>{
    const cb='_gviz_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    let timer=setTimeout(()=>{ cleanup(); reject(new Error('timeout')); },15000);
    function cleanup(){ try{ delete window[cb]; s.remove(); }catch(e){} }
    window[cb]=(d)=>{ clearTimeout(timer); cleanup(); resolve(d); };
    const s=document.createElement('script');
    s.onerror=()=>{ clearTimeout(timer); cleanup(); reject(new Error('script load error')); };
    // tqx responseHandler format — works from file:// (no CORS restriction on <script>)
    // Supports both sheet name and gid
    const param=opts.gid?'gid='+opts.gid:'sheet='+encodeURIComponent(sheetName);
    s.src='https://docs.google.com/spreadsheets/d/'+SHEET_ID+
          '/gviz/tq?tqx=out:json;responseHandler:'+cb+'&'+param;
    document.head.appendChild(s);
  });
}

function cv(row,i){
  if(!row||!row.c||i>=row.c.length) return null;
  const c=row.c[i]; return c?c.v:null;
}
function toN(v){
  if(v===null||v===undefined) return 0;
  if(typeof v==='number') return v;
  const n=parseFloat(String(v).replace(/[^0-9.\-]/g,''));
  return isNaN(n)?0:n;
}

function parseYearSheet(gd){
  const rows=gd.table.rows;
  const MAP={'原渥站前':'wo_zhanqian','原渥大安':'wo_daan','原渥忠孝':'wo_zhongxiao',
    '原渥板橋':'wo_banqiao','原渥東門':'wo_dongmen','原綺台北':'ki_taipei',
    '原渥台中':'wo_taichung','原綺台中':'ki_taichung'};
  const hist={}, tgt={};
  for(let ri=2;ri<rows.length;ri++){
    const r=rows[ri];
    const name=cv(r,0); if(!name||!MAP[name]) continue;
    const k=MAP[name], h=[];
    const r21=toN(cv(r,1)); if(r21) h.push({yr:2021,rev:r21});
    const r22=toN(cv(r,2)); if(r22) h.push({yr:2022,rev:r22});
    const r23=toN(cv(r,4)); if(r23) h.push({yr:2023,rev:r23});
    const r24=toN(cv(r,6)),t24=toN(cv(r,7));
    if(r24) h.push({yr:2024,rev:r24,...(t24?{target:t24}:{})});
    const r25=toN(cv(r,10)),t25=toN(cv(r,11));
    if(r25) h.push({yr:2025,rev:r25,...(t25?{target:t25}:{})});
    hist[k]=h;
    const t26=toN(cv(r,15)); if(t26) tgt[k]=t26;
  }
  return {hist,tgt};
}

function parseStoreSheet(gd,storeMap){
  // Sheet structure: section separator rows have c1="StoreName｜Year" (full-width pipe)
  // Metric rows follow: c1=總業績/新客業績/舊客業績/新客數/舊客數/目標, c2=YTD, cols 3-14=months 1-12
  const rows=gd.table.rows||[];
  const storeMetrics={};
  let curKey=null, curYear=null;

  for(const r of rows){
    const col1=cv(r,1), col1s=col1?String(col1).trim():'';
    // Section separator: sheet uses FULL-WIDTH pipe ｜ (U+FF5C); match both
    const sep=col1s.match(/^(.+)[|｜](\d{4})$/);
    if(sep){
      const storePart=sep[1].trim(), year=parseInt(sep[2]);
      curYear=year;
      if(year===2026 && storeMap[storePart]){
        curKey=storeMap[storePart];
        if(!storeMetrics[curKey]) storeMetrics[curKey]={};
      } else { curKey=null; }
      continue;
    }
    if(!curKey||curYear!==2026) continue;
    if(['總業績','新客業績','舊客業績','新客數','舊客數','目標'].includes(col1s)){
      storeMetrics[curKey][col1s]=r;
    }
  }

  const result={};
  for(const[key,m] of Object.entries(storeMetrics)){
    const revR=m['總業績']; if(!revR) continue;
    const totalRev=toN(cv(revR,2)); if(totalRev<=0) continue;
    const newRevR=m['新客業績'], oldRevR=m['舊客業績'];
    const newCntR=m['新客數'],   oldCntR=m['舊客數'];
    const newRev=toN(cv(newRevR,2)), oldRev=toN(cv(oldRevR,2));
    const newCnt=toN(cv(newCntR,2)), oldCnt=toN(cv(oldCntR,2));
    const tgtR=m['目標'];
    const months=[];
    for(let mo=0;mo<12;mo++){
      months.push({
        m:(mo+1)+'月',
        rev:    toN(cv(revR,   3+mo)),
        new_rev:toN(cv(newRevR,3+mo)),
        old_rev:toN(cv(oldRevR,3+mo)),
        new_n:  toN(cv(newCntR,3+mo)),
        old_n:  toN(cv(oldCntR,3+mo)),
        tgt:    tgtR?toN(cv(tgtR,3+mo)):null,
        achieve:null,
      });
    }
    // Fallback: estimate June from YTD if June=0 but YTD > sum(Jan-May)
    const sum15=months.slice(0,5).reduce((s,mo)=>s+mo.rev,0);
    if(months[5].rev===0 && totalRev>sum15) months[5].rev=totalRev-sum15;
    result[key]={totalRev,newRev,oldRev,totalCnt:newCnt+oldCnt,newCnt,oldCnt,months};
  }
  return result;
}


function parseSrcSheet(gd){
  // Sheet gid=1673065208: monthly per-store new customer source breakdown
  // Col 1=store name, col 3="人數", col 7=行銷, col 8=業務, col 9=團購, col 10=其他
  // Brand context set by rows with col1="原綺" or "原渥"
  const rows=gd.table.rows||[];
  const result={};
  let brandCtx=null;
  // Read the month label from col headers
  const monthLabel=(gd.table.cols[4]||{}).label||'';
  for(const r of rows){
    const c1=String(cv(r,1)||'').trim();
    const c3=String(cv(r,3)||'').trim();
    if(c1==='原綺'){ brandCtx='ki'; continue; }
    if(c1==='原渥'){ brandCtx='wo'; continue; }
    if(!c1||c3!=='人數') continue;
    let key=null;
    if(c1==='台北') key='ki_taipei';
    else if(c1==='台中'&&brandCtx==='ki') key='ki_taichung';
    else if(c1==='站前') key='wo_zhanqian';
    else if(c1==='大安') key='wo_daan';
    else if(c1==='忠孝') key='wo_zhongxiao';
    else if(c1==='東門') key='wo_dongmen';
    else if(c1==='台中'&&brandCtx==='wo') key='wo_taichung';
    else if(c1==='板橋') key='wo_banqiao';
    if(key){
      result[key]={
        行銷:toN(cv(r,7))||0,
        業務:toN(cv(r,8))||0,
        團購:toN(cv(r,9))||0,

    }
  }
  return result;
}

      ..._moNames.map(n=>loadGviz(n).catch(()=>null)),
    ]);
    // Update historical + 2026 full-year targets
    const {hist:nh,tgt:nt}=parseYearSheet(yrGd);
    Object.assign(HIST_DATA,nh);
    // Merge sheet targets but protect paired stores (shared targets in PAIRED_STORES take precedence)
    for(const[k,v] of Object.entries(nt)){
      if(!PAIRED_STORES[k]) TARGET_2026[k]=v;
    }
    // Update store data
    const WO_MAP={'站前':'wo_zhanqian','大安':'wo_daan','忠孝':'wo_zhongxiao','板橋':'wo_banqiao','東門':'wo_dongmen','台中':'wo_taichung'};

    if(_kit) console.log('[sync] ki_taipei jun rev:',_kit.months[5]?.rev,'YTD:',_kit.totalRev);
    else console.warn('[sync] ki_taipei NOT FOUND');
    for(const[k,ss]of Object.entries(allStores)){
      const d=DATA[k]; if(!d||ss.totalRev<=0) continue;

      d.achieve_h1=d.target_h1>0?ss.totalRev/d.target_h1:0;
      // Monthly achieve: priority: Sheet 目標 row → DATA.monthly_tgt → H1/6 fallback
      const fallbackMTgt=d.target_h1/6;
      d.months=ss.months.map((m,idx)=>{
        const tgt=m.tgt||(d.monthly_tgt?d.monthly_tgt[idx]:null)||fallbackMTgt;

      });
    }
    // Sum per-store new customer source breakdown across all loaded months
    const srcData={};
    for(const gd of srcGds){
      if(!gd) continue;
      const mo=parseSrcSheet(gd);
      for(const[k,src] of Object.entries(mo)){
        if(!srcData[k]) srcData[k]={行銷:0,業務:0,團購:0,其他:0,_label:'H1累計'};
        srcData[k].行銷+=src.行銷||0;
        srcData[k].業務+=src.業務||0;
        srcData[k].團購+=src.團購||0;
        srcData[k].其他+=src.其他||0;
      }
    }
    for(const[k,src] of Object.entries(srcData)){
      if(DATA[k]) DATA[k].new_src=src;
    }
    // Build per-month snapshot for monthly performance tab
    MO_SNAP_DATA=new Array(12).fill(null);
    for(let i=0;i<srcGds.length;i++){
      if(srcGds[i]) MO_SNAP_DATA[i]=parseMoSheet(srcGds[i]);
    }
    const lastLoaded=srcGds.filter(Boolean).length-1;
    if(lastLoaded>=0) _curMoTab=lastLoaded;
    const now=new Date();
    document.getElementById('sync-time').textContent=
      '已同步 '+now.toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    refreshAll();
  }catch(err){
    console.error('Sheets sync failed:',err.message, err);
    document.getElementById('sync-time').textContent='離線模式（本地資料）';
  }
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
loadData();
</script>
